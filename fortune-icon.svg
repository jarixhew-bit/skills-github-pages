<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1f4e"/>
      <stop offset="100%" stop-color="#0d0a1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#c9a84c" stroke-width="2" stroke-opacity="0.4"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Glow -->
  <circle cx="256" cy="256" r="160" fill="url(#glow)"/>
  <!-- Eight trigram positions (dots) -->
  <circle cx="256" cy="56"  r="5" fill="#c9a84c" opacity="0.7"/>
  <circle cx="256" cy="456" r="5" fill="#c9a84c" opacity="0.7"/>
  <circle cx="56"  cy="256" r="5" fill="#c9a84c" opacity="0.7"/>
  <circle cx="456" cy="256" r="5" fill="#c9a84c" opacity="0.7"/>
  <circle cx="115" cy="115" r="4" fill="#c9a84c" opacity="0.5"/>
  <circle cx="397" cy="115" r="4" fill="#c9a84c" opacity="0.5"/>
  <circle cx="115" cy="397" r="4" fill="#c9a84c" opacity="0.5"/>
  <circle cx="397" cy="397" r="4" fill="#c9a84c" opacity="0.5"/>
  <!-- Connecting lines -->
  <line x1="256" y1="56"  x2="397" y2="115" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="397" y1="115" x2="456" y2="256" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="456" y1="256" x2="397" y2="397" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="397" y1="397" x2="256" y2="456" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="256" y1="456" x2="115" y2="397" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="115" y1="397" x2="56"  y2="256" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="56"  y1="256" x2="115" y2="115" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <line x1="115" y1="115" x2="256" y2="56"  stroke="#c9a84c" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Stars -->
  <circle cx="180" cy="130" r="2" fill="white" opacity="0.6"/>
  <circle cx="340" cy="100" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="420" cy="180" r="2" fill="white" opacity="0.6"/>
  <circle cx="90"  cy="330" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="430" cy="360" r="2" fill="white" opacity="0.6"/>
  <circle cx="160" cy="420" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="380" cy="430" r="2" fill="white" opacity="0.5"/>
  <!-- Main symbol: crescent moon -->
  <path d="M256,140 A116,116 0 1,0 326,368 A80,80 0 1,1 256,140Z" fill="#c9a84c" opacity="0.9"/>
  <!-- Star beside moon -->
  <polygon points="345,170 352,190 373,190 357,202 363,222 345,210 327,222 333,202 317,190 338,190"
           fill="#c9a84c" opacity="0.8"/>
</svg>
