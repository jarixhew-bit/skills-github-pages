<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玄機閣 · 算命占卜</title>
<style>
  :root {
    --gold: #c9a84c;
    --dark: #0d0a1a;
    --panel: #16102b;
    --border: #2e2060;
    --text: #e8dfc8;
    --muted: #8a7fa0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Noto Serif TC', 'Georgia', serif;
    min-height: 100vh;
  }
  /* Background stars */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,200,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,200,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 15%, rgba(255,255,200,0.7) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 40%, rgba(255,255,200,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,200,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 85%, rgba(255,255,200,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 90%, rgba(255,255,200,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 50%, rgba(255,255,200,0.3) 0%, transparent 100%),
      radial-gradient(2px 2px at 80% 10%, rgba(255,255,200,0.8) 0%, transparent 100%),
      radial-gradient(2px 2px at 5% 45%, rgba(255,255,200,0.7) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    text-align: center;
    padding: 40px 20px 20px;
    position: relative;
    z-index: 1;
  }
  header h1 {
    font-size: 2.6rem;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(201,168,76,0.6);
    letter-spacing: 0.2em;
  }
  header p {
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.95rem;
    letter-spacing: 0.1em;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    padding: 20px;
    position: relative;
    z-index: 1;
  }
  nav button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 22px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 1rem;
    font-family: inherit;
    letter-spacing: 0.05em;
    transition: all 0.3s;
  }
  nav button:hover, nav button.active {
    background: rgba(201,168,76,0.15);
    border-color: var(--gold);
    color: var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }

  .section {
    display: none;
    max-width: 780px;
    margin: 0 auto;
    padding: 10px 20px 60px;
    position: relative;
    z-index: 1;
  }
  .section.active { display: block; }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.4);
  }

  h2 {
    color: var(--gold);
    font-size: 1.3rem;
    margin-bottom: 18px;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  label {
    display: block;
    color: var(--muted);
    font-size: 0.88rem;
    margin-bottom: 6px;
    margin-top: 14px;
    letter-spacing: 0.05em;
  }
  label:first-of-type { margin-top: 0; }

  input, select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 14px;
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
  }
  select option { background: var(--panel); }
  textarea { resize: vertical; min-height: 80px; }

  .btn {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, #8b6914, #c9a84c, #8b6914);
    border: none;
    border-radius: 10px;
    color: #0d0a1a;
    font-size: 1.05rem;
    font-weight: bold;
    font-family: inherit;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.99); }

  .result {
    display: none;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px;
    padding: 22px;
    margin-top: 20px;
    line-height: 1.9;
    font-size: 0.97rem;
  }
  .result.show { display: block; }
  .result h3 {
    color: var(--gold);
    margin-bottom: 12px;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
  }
  .result p { margin-bottom: 10px; color: var(--text); }
  .result .tag {
    display: inline-block;
    background: rgba(201,168,76,0.18);
    color: var(--gold);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.85rem;
    margin: 3px;
  }
  .result .section-title {
    color: var(--gold);
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    margin: 14px 0 6px;
    border-left: 3px solid var(--gold);
    padding-left: 10px;
  }

  /* Tarot */
  .tarot-deck {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    margin: 20px 0;
  }
  .tarot-slot {
    width: 110px;
    text-align: center;
  }
  .tarot-slot label {
    font-size: 0.8rem;
    color: var(--muted);
    display: block;
    margin-bottom: 8px;
    margin-top: 0;
  }
  .tarot-card {
    width: 100px;
    height: 160px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: linear-gradient(135deg, #1a1035, #2a1f4e);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
    margin: 0 auto;
  }
  .tarot-card::before {
    content: '✦';
    color: rgba(201,168,76,0.3);
    font-size: 4rem;
    position: absolute;
  }
  .tarot-card.revealed {
    border-color: var(--gold);
    box-shadow: 0 0 18px rgba(201,168,76,0.35);
    background: linear-gradient(135deg, #2a1f4e, #1a1035);
  }
  .tarot-card .card-content {
    display: none;
    flex-direction: column;
    align-items: center;
    z-index: 1;
  }
  .tarot-card.revealed .card-content { display: flex; }
  .tarot-card.revealed::before { display: none; }
  .tarot-card .card-icon { font-size: 2.2rem; }
  .tarot-card .card-name {
    font-size: 0.7rem;
    color: var(--gold);
    margin-top: 6px;
    text-align: center;
    line-height: 1.3;
  }
  .tarot-card .card-reversed {
    font-size: 0.6rem;
    color: #e06060;
    margin-top: 2px;
  }

  /* Ziwei grid */
  .ziwei-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    margin-top: 16px;
  }
  .ziwei-cell {
    border: 1px solid var(--border);
    padding: 10px 8px;
    min-height: 80px;
    font-size: 0.78rem;
  }
  .ziwei-cell .palace-name {
    color: var(--gold);
    font-size: 0.7rem;
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }
  .ziwei-cell .stars {
    color: var(--text);
    line-height: 1.5;
  }
  .ziwei-cell .main-star {
    color: #f0c060;
    font-weight: bold;
  }

  /* Bazi pillars */
  .bazi-pillars {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .pillar {
    text-align: center;
    width: 70px;
  }
  .pillar .pillar-label {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .pillar .stem, .pillar .branch {
    padding: 8px 0;
    border-radius: 6px;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
  }
  .pillar .stem {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    margin-bottom: 4px;
  }
  .pillar .branch {
    background: rgba(100,150,255,0.1);
    border: 1px solid rgba(100,150,255,0.3);
    color: #a0c0ff;
  }
  .element-badge {
    display: inline-block;
    width: 28px; height: 28px;
    line-height: 28px;
    border-radius: 50%;
    font-size: 0.85rem;
    margin: 3px;
    text-align: center;
  }
  .el-wood { background: rgba(80,180,80,0.2); color: #80e080; border: 1px solid #80e08060; }
  .el-fire { background: rgba(220,80,80,0.2); color: #ff9090; border: 1px solid #ff909060; }
  .el-earth { background: rgba(180,140,60,0.2); color: #d4b060; border: 1px solid #d4b06060; }
  .el-metal { background: rgba(200,200,220,0.2); color: #d0d0e0; border: 1px solid #d0d0e060; }
  .el-water { background: rgba(60,120,220,0.2); color: #80b0ff; border: 1px solid #80b0ff60; }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 18px 0;
  }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.78rem;
    padding: 30px 20px;
    position: relative;
    z-index: 1;
    letter-spacing: 0.05em;
  }

  /* Loading animation */
  .loading { display: none; text-align: center; padding: 20px; color: var(--muted); }
  .loading.show { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>☽ 玄機閣 ☾</h1>
  <p>紫微 · 塔羅 · 八字 · 解夢</p>
</header>

<nav>
  <button class="active" onclick="showSection('ziwei', this)">🌟 紫微斗數</button>
  <button onclick="showSection('tarot', this)">🃏 塔羅牌</button>
  <button onclick="showSection('bazi', this)">☯ 八字命理</button>
  <button onclick="showSection('dream', this)">🌙 周公解夢</button>
</nav>

<!-- ========== 紫微斗數 ========== -->
<div id="ziwei" class="section active">
  <div class="card">
    <h2>🌟 紫微斗數命盤</h2>
    <label>出生年份</label>
    <input type="number" id="zw-year" placeholder="例：1990" min="1900" max="2025">
    <label>出生月份</label>
    <select id="zw-month">
      <option value="">請選擇</option>
      <option value="1">一月</option><option value="2">二月</option>
      <option value="3">三月</option><option value="4">四月</option>
      <option value="5">五月</option><option value="6">六月</option>
      <option value="7">七月</option><option value="8">八月</option>
      <option value="9">九月</option><option value="10">十月</option>
      <option value="11">十一月</option><option value="12">十二月</option>
    </select>
    <label>出生日期</label>
    <input type="number" id="zw-day" placeholder="例：15" min="1" max="31">
    <label>出生時辰</label>
    <select id="zw-hour">
      <option value="">請選擇</option>
      <option value="0">子時（23:00–01:00）</option>
      <option value="1">丑時（01:00–03:00）</option>
      <option value="2">寅時（03:00–05:00）</option>
      <option value="3">卯時（05:00–07:00）</option>
      <option value="4">辰時（07:00–09:00）</option>
      <option value="5">巳時（09:00–11:00）</option>
      <option value="6">午時（11:00–13:00）</option>
      <option value="7">未時（13:00–15:00）</option>
      <option value="8">申時（15:00–17:00）</option>
      <option value="9">酉時（17:00–19:00）</option>
      <option value="10">戌時（19:00–21:00）</option>
      <option value="11">亥時（21:00–23:00）</option>
    </select>
    <label>性別</label>
    <select id="zw-gender">
      <option value="m">男</option>
      <option value="f">女</option>
    </select>
    <button class="btn" onclick="calcZiwei()">✦ 起命盤 ✦</button>
  </div>
  <div class="loading" id="zw-loading"><span class="spinner"></span>天星運轉中…</div>
  <div class="result" id="zw-result"></div>
</div>

<!-- ========== 塔羅牌 ========== -->
<div id="tarot" class="section">
  <div class="card">
    <h2>🃏 塔羅牌占卜</h2>
    <label>占問主題</label>
    <select id="tarot-topic">
      <option value="love">感情愛情</option>
      <option value="career">事業財運</option>
      <option value="health">健康身體</option>
      <option value="general">整體運勢</option>
      <option value="decision">重要決定</option>
    </select>
    <label>想問的問題（可不填）</label>
    <input type="text" id="tarot-question" placeholder="例：我的感情何時有進展？">
    <label>牌陣</label>
    <select id="tarot-spread">
      <option value="1">單張牌（直接指引）</option>
      <option value="3" selected>三張牌（過去·現在·未來）</option>
      <option value="5">五張牌（凱爾特十字簡版）</option>
    </select>
    <button class="btn" onclick="drawTarot()">✦ 洗牌抽牌 ✦</button>
  </div>
  <div class="loading" id="tarot-loading"><span class="spinner"></span>命運之牌浮現中…</div>
  <div class="result" id="tarot-result"></div>
</div>

<!-- ========== 八字 ========== -->
<div id="bazi" class="section">
  <div class="card">
    <h2>☯ 八字命理</h2>
    <label>出生日期</label>
    <input type="date" id="bz-date" max="2025-12-31">
    <label>出生時間（當地標準時間）</label>
    <input type="time" id="bz-time" placeholder="HH:MM">
    <label>出生地點</label>
    <select id="bz-city" onchange="updateLongitude()">
      <option value="">— 選擇城市 —</option>
      <optgroup label="台灣">
        <option value="121.5">台北／台灣（121.5°E）</option>
        <option value="120.7">台中（120.7°E）</option>
        <option value="120.3">台南（120.3°E）</option>
        <option value="120.3">高雄（120.3°E）</option>
      </optgroup>
      <optgroup label="中國大陸">
        <option value="116.4">北京（116.4°E）</option>
        <option value="121.5">上海（121.5°E）</option>
        <option value="113.3">廣州（113.3°E）</option>
        <option value="114.1">深圳（114.1°E）</option>
        <option value="104.1">成都（104.1°E）</option>
        <option value="108.9">西安（108.9°E）</option>
        <option value="106.5">重慶（106.5°E）</option>
        <option value="120.2">杭州（120.2°E）</option>
        <option value="117.0">南京（117.0°E）</option>
        <option value="112.9">武漢（112.9°E）</option>
        <option value="113.6">鄭州（113.6°E）</option>
        <option value="126.5">哈爾濱（126.5°E）</option>
        <option value="123.4">瀋陽（123.4°E）</option>
        <option value="87.6">烏魯木齊（87.6°E）</option>
        <option value="102.7">昆明（102.7°E）</option>
      </optgroup>
      <optgroup label="香港／澳門">
        <option value="114.2">香港（114.2°E）</option>
        <option value="113.5">澳門（113.5°E）</option>
      </optgroup>
      <optgroup label="海外">
        <option value="103.8">新加坡（103.8°E）</option>
        <option value="101.7">吉隆坡（101.7°E）</option>
        <option value="100.5">曼谷（100.5°E）</option>
        <option value="-118.2">洛杉磯（-118.2°E）</option>
        <option value="-73.9">紐約（-73.9°E）</option>
        <option value="-0.1">倫敦（-0.1°E）</option>
        <option value="2.3">巴黎（2.3°E）</option>
        <option value="139.7">東京（139.7°E）</option>
        <option value="151.2">雪梨（151.2°E）</option>
      </optgroup>
    </select>
    <label>或自行輸入經度</label>
    <div style="display:flex;gap:8px;align-items:center">
      <input type="number" id="bz-longitude" placeholder="例：121.5（東經為正，西經為負）" step="0.1" min="-180" max="180" style="flex:1">
      <span style="color:var(--muted);font-size:0.85rem;white-space:nowrap">°E</span>
    </div>
    <label>時區（UTC+）</label>
    <select id="bz-timezone">
      <option value="8" selected>UTC+8（台灣／中國／香港／新加坡）</option>
      <option value="9">UTC+9（日本／韓國）</option>
      <option value="7">UTC+7（泰國／越南）</option>
      <option value="5.5">UTC+5:30（印度）</option>
      <option value="0">UTC+0（英國）</option>
      <option value="1">UTC+1（法國）</option>
      <option value="-5">UTC-5（美國東部）</option>
      <option value="-8">UTC-8（美國西部）</option>
      <option value="10">UTC+10（澳洲東部）</option>
      <option value="-3">UTC-3（巴西）</option>
    </select>
    <label>性別</label>
    <select id="bz-gender">
      <option value="m">男</option>
      <option value="f">女</option>
    </select>
    <button class="btn" onclick="calcBazi()">✦ 排八字 ✦</button>
  </div>
  <div class="loading" id="bz-loading"><span class="spinner"></span>換算真太陽時中…</div>
  <div class="result" id="bz-result"></div>
</div>

<!-- ========== 解夢 ========== -->
<div id="dream" class="section">
  <div class="card">
    <h2>🌙 周公解夢</h2>
    <label>夢境描述</label>
    <textarea id="dream-text" placeholder="請描述你的夢境，例如：夢見自己在飛、夢見水、夢見已故親人…"></textarea>
    <label>做夢時間</label>
    <select id="dream-time">
      <option value="early">入夜初夢（睡後1–3小時）</option>
      <option value="mid">半夜夢（3–5小時）</option>
      <option value="late" selected>天亮前夢（5小時後）</option>
    </select>
    <label>近期心情</label>
    <select id="dream-mood">
      <option value="happy">愉快開心</option>
      <option value="anxious">焦慮不安</option>
      <option value="sad">憂鬱低落</option>
      <option value="neutral" selected>平靜平常</option>
    </select>
    <button class="btn" onclick="interpretDream()">✦ 解析夢境 ✦</button>
  </div>
  <div class="loading" id="dream-loading"><span class="spinner"></span>周公正在解夢…</div>
  <div class="result" id="dream-result"></div>
</div>

<footer>
  ☽ 玄機閣 ☾ · 僅供娛樂參考，不構成任何人生建議
</footer>

<script>
// ===== Navigation =====
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

// ===== Utilities =====
function loading(id, show) {
  document.getElementById(id).classList.toggle('show', show);
}
function showResult(id, html) {
  const el = document.getElementById(id);
  el.innerHTML = html;
  el.classList.add('show');
}
function rng(seed) {
  // Simple seeded pseudo-random
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}
function pick(arr, rand) { return arr[Math.floor(rand() * arr.length)]; }
function seed() { return Date.now() + Math.random() * 99999 | 0; }

// ===== 紫微斗數 =====

function calcZiwei() {
  const year = parseInt(document.getElementById('zw-year').value);
  const month = parseInt(document.getElementById('zw-month').value);
  const day = parseInt(document.getElementById('zw-day').value);
  const hour = parseInt(document.getElementById('zw-hour').value);
  const gender = document.getElementById('zw-gender').value;

  if (!year || !month || !day || isNaN(hour)) {
    alert('請填寫完整出生資訊');
    return;
  }

  loading('zw-loading', true);
  document.getElementById('zw-result').classList.remove('show');

  setTimeout(() => {
    loading('zw-loading', false);
    const rand = rng(year * 1000 + month * 100 + day + hour);

    // Generate palace stars
    const palaceStars = palaces.map((_, i) => {
      const stars = [];
      if (rand() > 0.5) stars.push(`<span class="main-star">${pick(mainStars, rand)}</span>`);
      if (rand() > 0.6) stars.push(pick(mainStars, rand));
      if (rand() > 0.7) stars.push(pick(minorStars, rand));
      return stars;
    });

    // Ensure 命宮 has a main star
    if (!palaceStars[0].length) palaceStars[0].push(`<span class="main-star">${pick(mainStars, rand)}</span>`);

    const personality = pick(personalities, rand);
    const loveText = pick(fortuneTexts.love, rand);
    const careerText = pick(fortuneTexts.career, rand);
    const wealthText = pick(fortuneTexts.wealth, rand);

    const genderText = gender === 'm' ? '男命' : '女命';
    const lunarNote = `${year}年${month}月${day}日 ${['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'][hour]}時`;

    let gridHtml = '<div class="ziwei-grid">';
    // Arrange 12 palaces in 4x4 grid (standard layout approximation)
    const gridOrder = [11,0,1,2,10,null,null,3,9,null,null,4,8,7,6,5];
    gridOrder.forEach(idx => {
      if (idx === null) {
        gridHtml += '<div class="ziwei-cell" style="background:rgba(0,0,0,0.2)"></div>';
      } else {
        gridHtml += `<div class="ziwei-cell">
          <div class="palace-name">${palaces[idx]}</div>
          <div class="stars">${palaceStars[idx].join('<br>') || '…'}</div>
        </div>`;
      }
    });
    gridHtml += '</div>';

    showResult('zw-result', `
      <h3>☽ ${lunarNote} ${genderText} 命盤</h3>
      ${gridHtml}
      <hr class="divider">
      <div class="section-title">▎命主性格</div>
      <p>${personality}</p>
      <div class="section-title">▎感情運勢</div>
      <p>${loveText}</p>
      <div class="section-title">▎事業運勢</div>
      <p>${careerText}</p>

        ✦ 命盤僅供參考，實際命運由自身造化決定 ✦

function drawTarot() {
  const count = parseInt(document.getElementById('tarot-spread').value);
  const topic = document.getElementById('tarot-topic').value;
  const question = document.getElementById('tarot-question').value;

  loading('tarot-loading', true);
  document.getElementById('tarot-result').classList.remove('show');
  drawnCards = [];

  const rand = rng(seed());
  const shuffled = [...tarotCards].sort(() => rand() - 0.5);
  drawnCards = shuffled.slice(0, count).map(c => ({
    ...c,
    reversed: rand() > 0.6,
  }));

  const labels = spreadLabels[String(count)];

  setTimeout(() => {
    loading('tarot-loading', false);

    let cardsHtml = '<div class="tarot-deck">';
    drawnCards.forEach((c, i) => {
      cardsHtml += `
        <div class="tarot-slot">
          <label>${labels[i]}</label>
          <div class="tarot-card revealed" style="${c.reversed ? 'transform:rotate(180deg)' : ''}">
            <div class="card-content">
              <div class="card-icon">${c.icon}</div>
              <div class="card-name">${c.name}</div>
              ${c.reversed ? '<div class="card-reversed">逆位</div>' : ''}
            </div>
          </div>
        </div>`;
    });
    cardsHtml += '</div>';

    let interpHtml = '';
    const topicInterp = tarotInterpretations[topic];
    drawnCards.forEach((c, i) => {
      const meaning = c.reversed ? c.down : c.up;
      const contextMsg = pick(c.reversed ? topicInterp.down : topicInterp.up, rng(seed()));

    showResult('tarot-result', `

function getStemBranch(year, month, day, hour) {
  // Simplified calculation (approximation)
  const base = 4; // 甲子 year base
  const yearIdx = (year - 4) % 10;
  const yearBranchIdx = (year - 4) % 12;
  const monthIdx = (year * 12 + month - 1) % 10;
  const monthBranchIdx = ((month + 1) % 12);
  const dayBase = Math.floor((year * 365.25 + month * 30.4375 + day) % 60);
  const dayIdx = dayBase % 10;
  const dayBranchIdx = dayBase % 12;
  const hourIdx = (dayIdx * 2 + Math.floor(hour)) % 10;
  const hourBranchIdx = hour % 12;

  return [
    {stem: stems[(yearIdx + 10) % 10], branch: branches[(yearBranchIdx + 12) % 12], label:'年柱'},
    {stem: stems[(monthIdx + 10) % 10], branch: branches[monthBranchIdx % 12], label:'月柱'},
    {stem: stems[(dayIdx + 10) % 10], branch: branches[(dayBranchIdx + 12) % 12], label:'日柱'},
    {stem: stems[(hourIdx + 10) % 10], branch: branches[hourBranchIdx % 12], label:'時柱'},
  ];
}

function updateLongitude() {
  const city = document.getElementById('bz-city');
  const val = city.value;

}

// 均時差（Equation of Time），單位：分鐘
// 使用Spencer(1971)公式近似，精度約±30秒
function equationOfTime(doy) {
  const B = (2 * Math.PI / 365) * (doy - 1);
  const eot = 229.18 * (0.000075
    + 0.001868 * Math.cos(B)   - 0.032077 * Math.sin(B)
    - 0.014615 * Math.cos(2*B) - 0.04089  * Math.sin(2*B));
  return eot; // minutes
}

// 一年中的第幾天
function dayOfYear(year, month, day) {
  const start = new Date(year, 0, 0);
  const date  = new Date(year, month - 1, day);
  return Math.floor((date - start) / 86400000);
}

// 輸入：標準時間(HH:MM)、出生日期、經度、時區offset(小時)
// 輸出：{ trueSolarMinutes, displayStr, shifted: bool, newDate }
function toTrueSolarTime(year, month, day, localHH, localMM, longitude, tzOffset) {
  // 地方平時修正：(經度 - 時區標準經線) × 4 分鐘
  const stdMeridian = tzOffset * 15;
  const lonCorrection = (longitude - stdMeridian) * 4; // minutes

  // 均時差
  const doy = dayOfYear(year, month, day);
  const eot = equationOfTime(doy);

  // 真太陽時 = 標準時 + 經度修正 + 均時差
  const stdMinutes = localHH * 60 + localMM;
  const trueSolarMinutes = stdMinutes + lonCorrection + eot;

  // 處理跨天
  let tsmAdj = trueSolarMinutes;
  let dateShift = 0;
  if (tsmAdj < 0)    { tsmAdj += 1440; dateShift = -1; }
  if (tsmAdj >= 1440){ tsmAdj -= 1440; dateShift = +1; }

  const tHH = Math.floor(tsmAdj / 60) % 24;
  const tMM = Math.round(tsmAdj % 60);
  const pad = n => String(n).padStart(2,'0');
  const displayStr = `${pad(tHH)}:${pad(tMM)}`;

  // 調整後日期
  const d = new Date(year, month-1, day);
  d.setDate(d.getDate() + dateShift);
  const newDate = { year: d.getFullYear(), month: d.getMonth()+1, day: d.getDate() };

  return {
    trueSolarMinutes: tsmAdj,
    displayStr,
    lonCorrection: Math.round(lonCorrection),
    eot: Math.round(eot * 10) / 10,
    dateShift,
    newDate,
  };
}

// 真太陽時（分鐘）→ 時辰index (0=子…11=亥)
// 子時跨日：23:00–01:00 → 前半夜子(0) / 後半夜仍子
function minutesToShichen(tsmMin) {
  // 子時起點 23:00 = 1380min；每時辰2小時
  // 先把時間轉成以「子時開始」為0的偏移
  let adj = tsmMin - (23 * 60); // 相對子時起點的分鐘數
  if (adj < 0) adj += 1440;
  return Math.floor(adj / 120) % 12;
}

const generalDreamInterp = [
  '此夢境反映你近期的內心狀態，潛意識在傳遞重要信號。',
  '夢境是心靈自我療癒的方式，訊息值得深思。',
  '此夢與你近期的壓力和期望有關，建議多休息放鬆。',
  '潛意識透過夢境提醒你某些被忽略的需求或關係。',
];

function interpretDream() {
  const text = document.getElementById('dream-text').value.trim();
  const dreamTime = document.getElementById('dream-time').value;
  const mood = document.getElementById('dream-mood').value;

  if (!text) { alert('請描述你的夢境'); return; }

  loading('dream-loading', true);
  document.getElementById('dream-result').classList.remove('show');

  setTimeout(() => {
    loading('dream-loading', false);
    const rand = rng(seed());

    // Find matching keywords
    const found = [];
    for (const [kw, data] of Object.entries(dreamKeywords)) {
      if (text.includes(kw)) found.push({kw, ...data});
    }

    const timeMsg = {
      early: '入夜初夢多為白天事務的延伸，影響較淺，不必過度在意。',
      mid: '半夜之夢較接近潛意識，所傳遞的訊息值得留意。',
      late: '天亮前的夢最貼近真實潛意識，古人認為此時之夢最靈驗。',
    }[dreamTime];

    const moodMsg = {
      happy: '在愉快心情下做的夢通常是正面的，反映內心的和諧。',
      anxious: '焦慮時做的夢往往放大了擔憂，需區分現實與夢境。',
      sad: '憂鬱狀態下的夢可能是內心釋放的管道，有助情緒療癒。',
      neutral: '平靜心態下的夢最能反映潛意識的真實想法。',
    }[mood];

    const generalMsg = pick(generalDreamInterp, rand);

    let kwHtml = '';
    if (found.length > 0) {
      found.forEach(f => {
        kwHtml += `
          <div class="section-title">▎夢見「${f.kw}」</div>
          <p>${f.meaning}</p>
          <p><span class="tag">建議</span> ${f.advice}</p>`;
      });
    } else {
      kwHtml = `
        <div class="section-title">▎夢境解析</div>
        <p>${generalMsg}</p>`;
    }

    showResult('dream-result', `
      <h3>🌙 夢境解析</h3>
      <div class="section-title">▎夢的時段</div>
      <p>${timeMsg}</p>
      <div class="section-title">▎心情影響</div>
      <p>${moodMsg}</p>
      ${kwHtml}
      <div class="section-title">▎今日建議</div>
      <p>${pick([
        '多飲水，靜心冥想五分鐘，讓夢境的訊息自然沉澱。',
        '用日記記下夢境細節，日後回顧會有新的領悟。',
        '夢境提醒你關注某件事，今天試著面對它。',
        '保持好奇心，夢境是潛意識送給你的禮物。',
      ], rand)}</p>
      <hr class="divider">
      <p style="color:var(--muted);font-size:0.82rem;text-align:center">
        ✦ 周公解夢，僅供心靈參考 ✦
      </p>
    `);
  }, 1500);
}
</script>
