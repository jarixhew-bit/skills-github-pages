<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票交易分析器</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card2: #12141d; --border: #2a2d3e;
    --text: #e2e8f0; --muted: #7c8698; --dim: #4b5468;
    --green: #22c55e; --green-bg: rgba(34,197,94,.12);
    --red: #f87171; --red-bg: rgba(248,113,113,.12);
    --blue: #60a5fa; --yellow: #fbbf24; --purple: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif; min-height: 100vh; font-size: 15px; }
  a { color: var(--blue); }

  header { position: sticky; top: 0; z-index: 20; background: rgba(15,17,23,.92); backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  header h1 { font-size: 17px; font-weight: 700; }
  .meta { color: var(--muted); font-size: 12px; }
  #lockBtn { margin-left: auto; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
  #lockBtn.unlocked { border-color: var(--green); color: var(--green); }

  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  section { margin-bottom: 28px; }
  .sec-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .sec-title .sub { font-size: 12px; font-weight: 400; color: var(--muted); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }

  /* 今日结论 */
  .conclusion { border-left: 3px solid var(--blue); }
  .conclusion .market-line { font-size: 15px; line-height: 1.7; }
  .action-list { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .action-item { background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 14px; line-height: 1.6; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
  .chip { background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 13px; cursor: pointer; }
  .chip b { font-weight: 700; }
  .chip.up { border-color: rgba(34,197,94,.4); }
  .chip.down { border-color: rgba(248,113,113,.4); }

  /* 数字格 */
  .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }
  @media (max-width: 700px) { .tiles { grid-template-columns: repeat(2, 1fr); } }
  .tile { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; }
  .tile .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .tile .value { font-size: 20px; font-weight: 700; letter-spacing: -.01em; }
  .tile .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .up { color: var(--green); } .down { color: var(--red); } .flat { color: var(--muted); }

  /* 锁定遮罩 */
  .locked-box { text-align: center; padding: 28px 16px; }
  .locked-box .icon { font-size: 26px; margin-bottom: 8px; }
  .locked-box p { color: var(--muted); font-size: 13px; margin: 6px 0 14px; line-height: 1.6; }
  .pw-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .pw-row input { background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 12px; font-size: 15px; width: 220px; }
  .pw-row button { background: var(--blue); border: 0; color: #0b1220; font-weight: 700; border-radius: 10px; padding: 10px 18px; font-size: 14px; cursor: pointer; }
  .pw-err { color: var(--red); font-size: 13px; margin-top: 8px; display: none; }

  /* 持仓卡 */
  .pos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 10px; }
  .pos-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
  .pos-head { display: flex; align-items: baseline; gap: 8px; }
  .pos-head .sym { font-size: 17px; font-weight: 700; }
  .pos-head .nm { font-size: 12px; color: var(--muted); }
  .pos-head .badge { margin-left: auto; }
  .pos-rows { margin-top: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; font-size: 13px; }
  .pos-rows .k { color: var(--muted); }
  .weight-track { background: var(--border); height: 5px; border-radius: 3px; margin-top: 10px; overflow: hidden; }
  .weight-fill { height: 5px; background: var(--blue); border-radius: 3px; }
  .pos-notes { margin-top: 10px; font-size: 12.5px; color: var(--yellow); line-height: 1.6; }
  .pos-notes.ok { color: var(--muted); }

  /* 行动/信号徽章 */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
  .badge.buy2 { background: var(--green-bg); color: var(--green); }
  .badge.buy1 { background: rgba(34,197,94,.08); color: #4ade80; }
  .badge.hold { background: rgba(124,134,152,.15); color: var(--muted); }
  .badge.sell1 { background: rgba(248,113,113,.08); color: #fca5a5; }
  .badge.sell2 { background: var(--red-bg); color: var(--red); }

  /* 扫描区 */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .fbtn { background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 5px 14px; font-size: 13px; cursor: pointer; }
  .fbtn.active { color: var(--text); border-color: var(--blue); }
  .scan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
  .scan-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: border-color .15s; }
  .scan-card:hover { border-color: var(--blue); }
  .scan-top { display: flex; align-items: center; gap: 8px; }
  .scan-top .sym { font-weight: 700; font-size: 15px; }
  .scan-top .nm { font-size: 11.5px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 9em; }
  .scan-top .badge { margin-left: auto; }
  .scan-mid { display: flex; align-items: baseline; gap: 10px; margin-top: 8px; }
  .scan-mid .px { font-size: 16px; font-weight: 700; }
  .scan-mid .chg { font-size: 13px; font-weight: 600; }
  .scan-mid svg { margin-left: auto; }
  .scan-detail { display: none; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; font-size: 12.5px; }
  .scan-card.open .scan-detail { display: block; }
  .sig-row { display: flex; gap: 8px; padding: 3px 0; line-height: 1.5; }
  .sig-row .tag { color: var(--muted); flex: 0 0 4.5em; }
  .kv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-top: 8px; color: var(--muted); }
  .kv-grid b { color: var(--text); font-weight: 600; }

  /* 复盘 */
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: right; padding: 8px 10px; color: var(--muted); font-weight: 500; font-size: 12px; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: right; font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }
  .insights { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .insights div { font-size: 13.5px; color: var(--text); background: var(--card2); border-radius: 8px; padding: 8px 12px; line-height: 1.6; }
  .table-wrap { overflow-x: auto; }

  /* 净值图 */
  #navChartWrap { position: relative; }
  #navTip { position: absolute; pointer-events: none; background: var(--card2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 12px; display: none; white-space: nowrap; z-index: 5; }

  .ai-note { margin-top: 12px; font-size: 14px; line-height: 1.8; background: var(--card2); border-left: 3px solid var(--purple); border-radius: 10px; padding: 12px 14px; white-space: pre-wrap; }

  footer { color: var(--dim); font-size: 12px; text-align: center; padding: 20px 16px 40px; line-height: 1.8; }
  .warn-note { color: var(--yellow); font-size: 12px; margin-top: 10px; }
  #loading { text-align: center; color: var(--muted); padding: 60px 0; }
</style>
</head>
<body>
<header>
  <h1>📊 股票交易分析器</h1>
  <span class="meta" id="metaLine">载入中…</span>
  <button id="lockBtn" onclick="onLockBtn()">🔒 解锁</button>
</header>

<div class="container">
  <div id="loading">数据载入中…</div>

  <section id="secConclusion" style="display:none">
    <div class="sec-title">🎯 今日结论</div>
    <div class="card conclusion">
      <div class="market-line" id="marketLine"></div>
      <div class="action-list" id="actionList"></div>
      <div class="chips" id="oppChips"></div>
    </div>
  </section>

  <section id="secPortfolio" style="display:none">
    <div class="sec-title">💼 我的持仓 <span class="sub" id="pfSub"></span></div>
    <div id="pfLocked" class="card locked-box">
      <div class="icon">🔒</div>
      <p>持仓与复盘数据已加密存放。输入密码解锁，本机会记住，下次自动打开。</p>
      <div class="pw-row">
        <input type="password" id="pwInput" placeholder="密码" onkeydown="if(event.key==='Enter')tryUnlock()">
        <button onclick="tryUnlock()">解锁</button>
      </div>
      <div class="pw-err" id="pwErr">密码不对，再试一次</div>
    </div>
    <div id="pfBody" style="display:none">
      <div class="tiles" id="pfTiles"></div>
      <div class="card" style="margin-bottom:10px">
        <div class="sec-title" style="font-size:13.5px;color:var(--muted)">账户净值走势</div>
        <div id="navChartWrap"><div id="navChart"></div><div id="navTip"></div></div>
      </div>
      <div class="pos-grid" id="posGrid"></div>
      <div class="ai-note" id="aiNote" style="display:none"></div>
    </div>
  </section>

  <section id="secScan" style="display:none">
    <div class="sec-title">🔍 市场扫描 <span class="sub" id="scanSub"></span></div>
    <div class="filters" id="filters"></div>
    <div class="scan-grid" id="scanGrid"></div>
  </section>

  <section id="secReview" style="display:none">
    <div class="sec-title">📒 交易复盘 <span class="sub" id="rvSub"></span></div>
    <div class="tiles" id="rvTiles"></div>
    <div class="card">
      <div class="table-wrap"><table id="rvTable"></table></div>
      <div class="insights" id="rvInsights"></div>
    </div>
  </section>

  <div class="warn-note" id="warnNote" style="display:none"></div>
</div>

<footer>
  技术指标信号由程序自动计算，仅供个人参考，不构成投资建议。<br>
  数据来源：Interactive Brokers · 每个交易日收盘后自动更新
</footer>

<script>
"use strict";
const PW_KEY = "tradingAnalyzerPw";
let PUB = null, PRIV = null;

// ---------- 工具 ----------
const $ = id => document.getElementById(id);
const fmtUsd = (v, d = 0) => (v == null ? "—" : (v < 0 ? "-$" : "$") + Math.abs(v).toLocaleString("en-US", { minimumFractionDigits: d, maximumFractionDigits: d }));
const fmtPct = v => v == null ? "—" : (v > 0 ? "+" : "") + v.toFixed(2) + "%";
const cls = v => v > 0 ? "up" : v < 0 ? "down" : "flat";
const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

function sparkSvg(vals, w, h, strokeW) {
  if (!vals || vals.length < 2) return "";
  const min = Math.min(...vals), max = Math.max(...vals), span = max - min || 1;
  const pts = vals.map((v, i) => [i / (vals.length - 1) * w, h - 2 - (v - min) / span * (h - 4)]);
  const d = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join("");
  const color = vals[vals.length - 1] >= vals[0] ? "var(--green)" : "var(--red)";
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><path d="${d}" fill="none" stroke="${color}" stroke-width="${strokeW}" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

// ---------- 解密 ----------
async function decryptEnvelope(envText, password) {
  const env = JSON.parse(envText);
  const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const keyMat = await crypto.subtle.importKey("raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: b64(env.salt), iterations: env.iter, hash: "SHA-256" },
    keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
  const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(env.nonce) }, key, b64(env.ct));
  return JSON.parse(new TextDecoder().decode(pt));
}

// ---------- 载入 ----------
async function boot() {
  try {
    const r = await fetch("data-public.json", { cache: "no-store" });
    PUB = await r.json();
  } catch (e) {
    $("loading").textContent = "公开数据载入失败：" + e.message;
    return;
  }
  $("loading").style.display = "none";
  renderPublic();
  const saved = localStorage.getItem(PW_KEY);
  if (saved) {
    const ok = await unlockWith(saved, true);
    if (!ok) localStorage.removeItem(PW_KEY);
  }
}

async function unlockWith(password, silent) {
  let envText;
  try {
    const r = await fetch("data-private.enc", { cache: "no-store" });
    if (!r.ok) throw new Error("尚无私密数据文件");
    envText = await r.text();
  } catch (e) {
    if (!silent) { $("pwErr").textContent = e.message; $("pwErr").style.display = "block"; }
    return false;
  }
  try {
    PRIV = await decryptEnvelope(envText, password);
  } catch (e) {
    if (!silent) { $("pwErr").textContent = "密码不对，再试一次"; $("pwErr").style.display = "block"; }
    return false;
  }
  localStorage.setItem(PW_KEY, password);
  $("pwErr").style.display = "none";
  renderPrivate();
  return true;
}

function tryUnlock() {
  const pw = $("pwInput").value.trim();
  if (pw) unlockWith(pw, false);
}

function onLockBtn() {
  if (PRIV) {
    if (confirm("锁定并忘记本机密码？")) {
      localStorage.removeItem(PW_KEY);
      location.reload();
    }
  } else {
    $("secPortfolio").scrollIntoView({ behavior: "smooth" });
    $("pwInput").focus();
  }
}

// ---------- 公开渲染 ----------
let filterMode = "all";
function renderPublic() {
  $("metaLine").textContent = `数据日期 ${PUB.data_date} · 更新于 ${PUB.generated_at}`;
  $("secConclusion").style.display = $("secScan").style.display = $("secPortfolio").style.display = "";

  $("marketLine").textContent = PUB.market.line;
  const chips = [];
  for (const sym of PUB.opportunities) {
    const t = PUB.tickers.find(x => x.symbol === sym);
    if (t) chips.push(`<span class="chip up" onclick="jumpTo('${t.symbol}')">🟢 <b>${t.symbol}</b> ${esc(t.name)} ${t.score > 0 ? "+" + t.score : t.score}分</span>`);
  }
  for (const sym of (PUB.weak || [])) {
    const t = PUB.tickers.find(x => x.symbol === sym);
    if (t) chips.push(`<span class="chip down" onclick="jumpTo('${t.symbol}')">🔴 <b>${t.symbol}</b> ${esc(t.name)} ${t.score}分</span>`);
  }
  $("oppChips").innerHTML = chips.join("");
  if (!PRIV) $("actionList").innerHTML = `<div class="action-item" style="color:var(--muted)">🔒 解锁后这里会显示针对你持仓的检查结论</div>`;

  const filters = [["all", "全部"], ["buy", "买入信号"], ["sell", "卖出信号"], ["etf", "只看ETF"], ["stk", "只看个股"]];
  $("filters").innerHTML = filters.map(([k, label]) =>
    `<button class="fbtn ${k === filterMode ? "active" : ""}" onclick="setFilter('${k}')">${label}</button>`).join("");
  $("scanSub").textContent = `共 ${PUB.tickers.length} 只 · 按信号强弱排序`;
  renderScan();

  if (PUB.warnings && PUB.warnings.length) {
    $("warnNote").style.display = "";
    $("warnNote").textContent = "⚠ 数据备注：" + PUB.warnings.slice(0, 4).join("；");
  }
}

function setFilter(k) { filterMode = k; renderPublic(); }

function renderScan() {
  const list = PUB.tickers.filter(t =>
    filterMode === "buy" ? t.score >= 2 :
    filterMode === "sell" ? t.score <= -2 :
    filterMode === "etf" ? t.etf :
    filterMode === "stk" ? !t.etf : true);
  $("scanGrid").innerHTML = list.map(t => `
    <div class="scan-card" id="card-${t.symbol}" onclick="this.classList.toggle('open')">
      <div class="scan-top"><span class="sym">${t.symbol}</span><span class="nm">${esc(t.name)}</span>
        <span class="badge ${t.act_cls}">${t.action} ${t.score > 0 ? "+" + t.score : t.score}</span></div>
      <div class="scan-mid"><span class="px">$${t.price}</span>
        <span class="chg ${cls(t.chg1d)}">${fmtPct(t.chg1d)}</span>${sparkSvg(t.spark, 92, 28, 1.5)}</div>
      <div class="scan-detail">
        ${t.signals.map(s => `<div class="sig-row"><span class="tag">${s[0]}</span><span>${esc(s[1])}</span></div>`).join("")}
        <div class="kv-grid">
          <span>RSI <b>${t.rsi ?? "—"}</b></span><span>距52周高点 <b>${t.from_52w_high}%</b></span>
          <span>MA50 <b>${t.ma50 ?? "—"}</b></span><span>MA200 <b>${t.ma200 ?? "—"}</b></span>
          <span>止损参考 <b>${t.stop_atr ? "$" + t.stop_atr : "—"}</b></span><span>90日走势见右上小图</span>
        </div>
      </div>
    </div>`).join("");
}

function jumpTo(sym) {
  if (filterMode !== "all") { filterMode = "all"; renderPublic(); }
  const el = $("card-" + sym);
  if (el) { el.classList.add("open"); el.scrollIntoView({ behavior: "smooth", block: "center" }); }
}

// ---------- 私密渲染 ----------
function renderPrivate() {
  $("lockBtn").textContent = "🔓 已解锁";
  $("lockBtn").classList.add("unlocked");
  $("pfLocked").style.display = "none";
  $("pfBody").style.display = "";
  const P = PRIV;

  $("actionList").innerHTML = (P.actions || []).map(a => `<div class="action-item">💡 ${esc(a)}</div>`).join("");

  const pf = P.perf || {};
  $("pfTiles").innerHTML = `
    <div class="tile"><div class="label">总资产</div><div class="value">${fmtUsd(P.account.net_liq)}</div>
      <div class="sub">现金 ${fmtUsd(P.account.cash)}（${P.account.cash_pct ?? "—"}%）</div></div>
    <div class="tile"><div class="label">今日</div><div class="value ${cls(pf["1d"])}">${fmtPct(pf["1d"])}</div></div>
    <div class="tile"><div class="label">本月</div><div class="value ${cls(pf.mtd)}">${fmtPct(pf.mtd)}</div></div>
    <div class="tile"><div class="label">今年以来</div><div class="value ${cls(pf.ytd)}">${fmtPct(pf.ytd)}</div>
      <div class="sub">${pf.approx ? "净值近似，含出入金影响" : "时间加权收益 (TWR)"}</div></div>`;
  $("pfSub").textContent = `${P.positions.length} 项持仓`;

  drawNavChart(P.nav_series || []);

  $("posGrid").innerHTML = P.positions.map(p => {
    const s = p.signal;
    return `<div class="pos-card">
      <div class="pos-head"><span class="sym">${p.symbol}</span>
        ${s ? `<span class="badge ${s.act_cls}">${s.action}</span>` : ""}</div>
      <div class="pos-rows">
        <span><span class="k">市值</span> <b>${fmtUsd(p.value)}</b></span>
        <span><span class="k">占比</span> <b>${p.weight}%</b></span>
        <span><span class="k">浮动盈亏</span> <b class="${cls(p.upnl)}">${fmtUsd(p.upnl)}（${fmtPct(p.upct)}）</b></span>
        <span><span class="k">今日</span> <b class="${cls(p.daily_pnl)}">${fmtUsd(p.daily_pnl)}</b></span>
        <span><span class="k">持有</span> ${p.qty} 股 @ $${p.avg_price}</span>
        <span><span class="k">现价</span> $${p.price}</span>
        ${s && s.stop_atr ? `<span><span class="k">止损参考</span> $${s.stop_atr}</span>` : ""}
        ${s ? `<span><span class="k">RSI</span> ${s.rsi ?? "—"} · 距高点 ${s.from_52w_high}%</span>` : ""}
      </div>
      <div class="weight-track"><div class="weight-fill" style="width:${Math.min(p.weight, 100)}%"></div></div>
      <div class="pos-notes ${p.notes.length ? "" : "ok"}">${p.notes.length ? "⚠ " + p.notes.map(esc).join("；") : "✓ 无异常信号"}</div>
    </div>`;
  }).join("");

  if (P.ai_note) { $("aiNote").style.display = ""; $("aiNote").textContent = "🤖 AI 点评：" + P.ai_note.trim(); }

  const R = P.review;
  if (R) {
    $("secReview").style.display = "";
    $("rvSub").textContent = `${R.first_date} ～ ${R.last_date}`;
    $("rvTiles").innerHTML = `
      <div class="tile"><div class="label">已实现盈亏</div><div class="value ${cls(R.realized)}">${fmtUsd(R.realized)}</div></div>
      <div class="tile"><div class="label">交易笔数</div><div class="value">${R.n_trades}</div></div>
      <div class="tile"><div class="label">卖出胜率</div><div class="value">${R.win_rate != null ? Math.round(R.win_rate * 100) + "%" : "—"}</div>
        <div class="sub">已了结 ${R.n_closed} 笔</div></div>
      <div class="tile"><div class="label">总手续费</div><div class="value">${fmtUsd(R.commission, 2)}</div></div>`;
    $("rvTable").innerHTML = `<tr><th>标的</th><th>笔数</th><th>买入额</th><th>卖出额</th><th>已实现</th></tr>` +
      R.per_symbol.map(s => `<tr><td><b>${s.symbol}</b></td><td>${s.n}</td><td>${fmtUsd(s.buys)}</td><td>${fmtUsd(s.sells)}</td>
        <td class="${cls(s.realized)}">${fmtUsd(s.realized)}</td></tr>`).join("");
    $("rvInsights").innerHTML = (R.insights || []).map(i => `<div>💡 ${esc(i)}</div>`).join("");
  }
}

// ---------- 净值图（单序列折线 + 悬停查看） ----------
let navData = [];
function drawNavChart(series) {
  navData = series;
  const wrap = $("navChart");
  if (series.length < 2) { wrap.innerHTML = `<div style="color:var(--muted);font-size:13px">净值数据积累中…</div>`; return; }
  const W = Math.min(wrap.clientWidth || 800, 1100), H = 180, padL = 8, padR = 8, padT = 10, padB = 22;
  const vals = series.map(s => s[1]);
  const min = Math.min(...vals), max = Math.max(...vals), span = max - min || 1;
  const x = i => padL + i / (series.length - 1) * (W - padL - padR);
  const y = v => padT + (1 - (v - min) / span) * (H - padT - padB);
  const pts = series.map((s, i) => [x(i), y(s[1])]);
  const line = pts.map((p, i) => (i ? "L" : "M") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join("");
  const area = line + `L${pts[pts.length - 1][0].toFixed(1)},${H - padB}L${pts[0][0].toFixed(1)},${H - padB}Z`;
  const upTrend = vals[vals.length - 1] >= vals[0];
  const c = upTrend ? "34,197,94" : "248,113,113";
  const ticks = [0, Math.floor(series.length / 2), series.length - 1];
  wrap.innerHTML = `<svg id="navSvg" width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="display:block">
    <path d="${area}" fill="rgba(${c},.10)"/>
    <path d="${line}" fill="none" stroke="rgb(${c})" stroke-width="2" stroke-linejoin="round"/>
    <line id="navCross" x1="0" x2="0" y1="${padT}" y2="${H - padB}" stroke="var(--dim)" stroke-dasharray="3,3" style="display:none"/>
    <circle id="navDot" r="3.5" fill="rgb(${c})" stroke="var(--bg)" stroke-width="2" style="display:none"/>
    ${ticks.map(i => `<text x="${x(i)}" y="${H - 6}" fill="var(--dim)" font-size="10" text-anchor="${i === 0 ? "start" : i === series.length - 1 ? "end" : "middle"}">${series[i][0]}</text>`).join("")}
  </svg>`;
  const svg = $("navSvg");
  svg.addEventListener("mousemove", ev => {
    const r = svg.getBoundingClientRect();
    const px = (ev.clientX - r.left) / r.width * W;
    const i = Math.max(0, Math.min(series.length - 1, Math.round((px - padL) / (W - padL - padR) * (series.length - 1))));
    $("navCross").setAttribute("x1", x(i)); $("navCross").setAttribute("x2", x(i));
    $("navCross").style.display = "";
    $("navDot").setAttribute("cx", x(i)); $("navDot").setAttribute("cy", y(series[i][1]));
    $("navDot").style.display = "";
    const tip = $("navTip");
    tip.style.display = "block";
    tip.innerHTML = `${series[i][0]}<br><b>${fmtUsd(series[i][1])}</b>`;
    const wrapR = $("navChartWrap").getBoundingClientRect();
    let lx = ev.clientX - wrapR.left + 12;
    if (lx > wrapR.width - 120) lx -= 140;
    tip.style.left = lx + "px";
    tip.style.top = "10px";
  });
  svg.addEventListener("mouseleave", () => {
    $("navTip").style.display = "none";
    $("navCross").style.display = "none";
    $("navDot").style.display = "none";
  });
}

boot();
</script>
