<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>洗髓功法</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --card: #131826;
    --card2: #1a2133;
    --line: #232c42;
    --gold: #d2ab66;
    --gold-soft: #e8d3a4;
    --gold-dim: rgba(210,171,102,0.35);
    --text: #ece4d2;
    --dim: #938b77;
    --green: #5fb586;
    --red: #c96a5e;
    --serif: 'Noto Serif TC', 'Songti TC', 'STSong', 'SimSun', serif;
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background:
      radial-gradient(1200px 500px at 50% -10%, #141b2e 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: 'PingFang TC', 'PingFang SC', 'Noto Sans CJK TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Header ── */
  header {
    padding: calc(14px + env(safe-area-inset-top)) 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11,14,20,0.85);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-titles { text-align: left; }
  header h1 {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.35em;
    text-shadow: 0 0 24px var(--gold-dim);
    white-space: nowrap;
  }
  header .sub {
    font-size: 0.72rem;
    color: var(--dim);
    margin-top: 3px;
    letter-spacing: 0.15em;
  }

  /* progress ring */
  .ring-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--line); stroke-width: 3.5; }
  .ring-fg {
    fill: none;
    stroke: var(--gold);
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-dasharray: 97.4;
    stroke-dashoffset: 97.4;
    transition: stroke-dashoffset 0.6s ease;
  }
  .ring-wrap.all-done .ring-fg { stroke: var(--green); }
  .ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.66rem;
    color: var(--dim);
  }
  .ring-wrap.all-done .ring-text { color: var(--green); }

  /* ── Sections ── */
  main { padding: 14px 14px 0; max-width: 560px; margin: 0 auto; }

  .section {
    margin-bottom: 12px;
    background: linear-gradient(180deg, var(--card2), var(--card));
    border-radius: 18px;
    border: 1px solid var(--line);
    transition: border-color 0.3s, opacity 0.3s;
    overflow: hidden;
  }
  .section.open { border-color: var(--gold-dim); }
  .section.running { border-color: var(--gold); }
  .section.done { border-color: rgba(95,181,134,0.4); opacity: 0.65; }

  .section-header {
    padding: 15px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .section-num {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(210,171,102,0.08);
    border: 1px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-size: 0.9rem;
    color: var(--gold);
    flex-shrink: 0;
  }
  .section.done .section-num {
    background: var(--green);
    border-color: var(--green);
    color: #0b0e14;
    font-weight: 700;
  }
  .section-title { flex: 1; min-width: 0; }
  .section-title h2 {
    font-family: var(--serif);
    font-size: 1.08rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.12em;
  }
  .section-title span { font-size: 0.72rem; color: var(--dim); letter-spacing: 0.05em; }
  .sec-status {
    font-size: 0.78rem;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .section.running .sec-status { color: var(--gold); }
  .section.done .sec-status { color: var(--green); }
  .section-chevron {
    color: var(--dim);
    font-size: 1.1rem;
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .section.open .section-chevron { transform: rotate(90deg); }

  .section-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.35s ease;
  }
  .section.open .section-body { grid-template-rows: 1fr; }
  .section-body > .inner { overflow: hidden; }
  .section.open .section-body > .inner { padding: 0 18px 20px; }

  /* ── Timer ── */
  .timer-display {
    font-size: 4.2rem;
    color: var(--gold-soft);
    text-align: center;
    font-weight: 200;
    letter-spacing: 4px;
    margin: 14px 0 6px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 28px var(--gold-dim);
  }
  .timer-display.running { color: var(--gold); }
  .timer-display.done-timer { color: var(--green); }
  .timer-hint {
    text-align: center;
    font-size: 0.72rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    margin-bottom: 12px;
  }

  .btn {
    padding: 13px 24px;
    border-radius: 50px;
    border: none;
    font-size: 0.98rem;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.93); }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), var(--gold-soft));
    color: #33270f;
    font-weight: 700;
    letter-spacing: 0.1em;
  }
  .btn-secondary {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--line);
  }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(201,106,94,0.5);
    font-size: 0.82rem;
    padding: 10px 18px;
  }
  .btn-success {
    background: var(--green);
    color: #0b0e14;
    font-weight: 700;
  }
  .timer-btns { display: flex; gap: 8px; }
  .timer-btns .btn {
    flex: 1;
    padding: 13px 6px;
    font-size: 0.9rem;
    white-space: nowrap;
  }
  .timer-btns .btn-main { flex: 1.6; }

  /* ── Audio ── */
  .audio-wrap {
    background: rgba(11,14,20,0.5);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 6px;
  }
  .audio-wrap p {
    font-size: 0.78rem;
    color: var(--dim);
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .audio-wrap audio { width: 100%; accent-color: var(--gold); }

  /* ── Lotus video + name list ── */
  .video-wrap {
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 10px;
    aspect-ratio: 16/9;
    border: 1px solid var(--line);
  }
  .video-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }
  .video-note {
    font-size: 0.7rem;
    color: var(--dim);
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
    line-height: 1.8;
  }
  .bili-link {
    display: inline-block;
    margin-top: 4px;
    padding: 6px 14px;
    border: 1px solid var(--gold-dim);
    border-radius: 20px;
    color: var(--gold);
    text-decoration: none;
    font-size: 0.75rem;
  }
  .lotus-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: 6px;
  }
  .lotus-list span {
    font-family: var(--serif);
    font-size: 0.82rem;
    color: var(--gold-soft);
    letter-spacing: 0.12em;
    padding: 6px 12px;
    border: 1px solid var(--line);
    border-radius: 20px;
    background: rgba(11,14,20,0.5);
    white-space: nowrap;
  }

  /* ── Completion ── */
  .completion-banner {
    display: none;
    margin: 4px 0 12px;
    background:
      radial-gradient(400px 160px at 50% 0%, rgba(95,181,134,0.18), transparent 70%),
      linear-gradient(180deg, var(--card2), var(--card));
    border: 1px solid rgba(95,181,134,0.45);
    border-radius: 18px;
    padding: 26px 20px;
    text-align: center;
  }
  .completion-banner.show { display: block; animation: rise 0.5s ease; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
  .completion-banner .icon { font-size: 2.8rem; }
  .completion-banner h2 {
    font-family: var(--serif);
    color: var(--green);
    margin: 12px 0 6px;
    font-size: 1.25rem;
    letter-spacing: 0.3em;
  }
  .completion-banner p { color: var(--dim); font-size: 0.85rem; letter-spacing: 0.15em; }

  .reset-all-wrap { text-align: center; padding: 10px 16px 36px; }
</style>
</head>
<body>

<header>
  <div class="header-titles">
    <h1>洗髓功法</h1>
    <div class="sub" id="today-sub">每日修練　持之以恆</div>
  </div>
  <div class="ring-wrap" id="ring-wrap">
    <svg width="52" height="52" viewBox="0 0 38 38">
      <circle class="ring-bg" cx="19" cy="19" r="15.5"></circle>
      <circle class="ring-fg" id="ring-fg" cx="19" cy="19" r="15.5"></circle>
    </svg>
    <div class="ring-text" id="progress-text">0/7</div>
  </div>
</header>

<main>
  <div id="sections"></div>

  <div class="completion-banner" id="completion">
    <div class="icon">🏆</div>
    <h2>今日修練完成</h2>
    <p>功德圓滿　明日再練</p>
  </div>

  <div class="reset-all-wrap">
    <button class="btn btn-danger" onclick="resetAll()">重置全部</button>
  </div>
</main>

<script>
// ── Data ──────────────────────────────────────────────────
// 全部段落統一為計時制（2026-07-13 使用者要求：練功時不方便點按計數）。
// 次數目標保留為參考文案，完成與否由使用者按「完成」自行判定。
const SECTIONS = [
  { id: 'tuna',     name: '吐　納',     sub: '調息 160 次', audio: '../audio/tuna.mp3' },
  { id: 'shougong', name: '收　功',     sub: '5 次' },
  { id: 'chuidiao', name: '垂　吊',     sub: '320 下' },
  { id: 'shuai',    name: '甩　鞭',     sub: '90 下' },
  { id: 'huiyin',   name: '會陰拍打',   sub: '30 下' },
  { id: 'fugu',     name: '腹股溝拍打', sub: '30 下' },
  { id: 'lotus',    name: '蓮花生動功', sub: '七式 · 隨影片練', video: true },
];

const LOTUS_NAMES = ['觀音請聖','仙鶴展翅','河住江翻','乾坤旋轉','犀牛望月','荷花搖擺','立地沖天'];
const NUMS = ['一','二','三','四','五','六','七'];

// ── State ─────────────────────────────────────────────────
// 舊欄位 counts/lotusDone/lotusTimers 保留讀取相容（不再寫入）；
// secTimers 存各段累計秒數，runningSince 存計時中的起始時間戳（毫秒），
// 用時間戳計算 elapsed——鎖屏、切後台、甚至重新整理都不會丟時間。
let state = JSON.parse(localStorage.getItem('xisui_state') || '{}');
if (!state.done) state.done = {};
if (!state.secTimers) {
  state.secTimers = {};
  // 從舊版蓮花七式分計時遷移：合併為蓮花段總時長
  if (state.lotusTimers) {
    const total = Object.values(state.lotusTimers).reduce((a, b) => a + (b || 0), 0);
    if (total > 0) state.secTimers.lotus = total;
  }
}
if (!state.runningSince) state.runningSince = {};
saveState(); // 遷移結果立即落盤，避免舊格式殘留

function saveState() {
  localStorage.setItem('xisui_state', JSON.stringify(state));
}

// ── Wake Lock（計時中保持螢幕常亮，失敗靜默） ──────────────
let wakeLock = null;
async function requestWake() {
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
}
function releaseWake() {
  if (wakeLock) { wakeLock.release().catch(() => {}); wakeLock = null; }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    renderAllTimers();
    if (Object.keys(state.runningSince).length) requestWake();
  }
});

// ── Timer engine ──────────────────────────────────────────
function elapsedSec(id) {
  let s = state.secTimers[id] || 0;
  if (state.runningSince[id]) s += Math.floor((Date.now() - state.runningSince[id]) / 1000);
  return s;
}

function fmtTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

function timerToggle(id) {
  if (state.runningSince[id]) {           // 暫停
    state.secTimers[id] = elapsedSec(id);
    delete state.runningSince[id];
    if (!Object.keys(state.runningSince).length) releaseWake();
  } else {                                // 開始／繼續
    state.done[id] = false;
    state.runningSince[id] = Date.now();
    requestWake();
    if (navigator.vibrate) navigator.vibrate(20);
  }
  saveState();
  renderTimer(id);
  renderHeader(id);
}

function timerReset(id) {
  state.secTimers[id] = 0;
  delete state.runningSince[id];
  state.done[id] = false;
  if (!Object.keys(state.runningSince).length) releaseWake();
  saveState();
  renderTimer(id);
  renderHeader(id);
  updateProgress();
}

function markDone(id) {
  state.secTimers[id] = elapsedSec(id);
  delete state.runningSince[id];
  state.done[id] = true;
  if (!Object.keys(state.runningSince).length) releaseWake();
  saveState();
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);
  renderTimer(id);
  renderHeader(id);
  const sec = document.getElementById('sec-' + id);
  sec.classList.remove('open');
  updateProgress();
  // 自動展開下一個未完成段落
  for (const s of SECTIONS) {
    if (!state.done[s.id]) {
      document.getElementById('sec-' + s.id).classList.add('open');
      break;
    }
  }
}

// 每 500ms 刷新所有計時中的顯示
setInterval(() => {
  Object.keys(state.runningSince).forEach(id => { renderTimer(id); renderHeader(id); });
}, 500);

// ── Render ────────────────────────────────────────────────
function buildSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  SECTIONS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'section';
    el.id = 'sec-' + s.id;
    el.innerHTML = `
      <div class="section-header" onclick="toggleSection('${s.id}')">
        <div class="section-num" id="num-${s.id}">${NUMS[i]}</div>
        <div class="section-title">
          <h2>${s.name}</h2>
          <span>${s.sub}</span>
        </div>
        <div class="sec-status" id="status-${s.id}"></div>
        <div class="section-chevron">›</div>
      </div>
      <div class="section-body"><div class="inner">
        ${s.audio ? `
        <div class="audio-wrap">
          <p>🔊 吐納功法音頻引導</p>
          <audio controls src="${s.audio}"></audio>
        </div>` : ''}
        ${s.video ? `
        <div class="video-wrap">
          <iframe
            src="https://player.bilibili.com/player.html?isOutside=true&bvid=BV19J411N7HC&p=1&autoplay=0&danmaku=0"
            allowfullscreen scrolling="no"
            referrerpolicy="no-referrer"
            title="蓮花生動功全套示範"></iframe>
        </div>
        <div class="video-note">
          全套示範影片 11:54 · 跟著影片練完整套<br>
          <a class="bili-link" href="https://www.bilibili.com/video/BV19J411N7HC/"
             target="_blank" rel="noopener">影片放不出來？點此在 B 站打開 ▶</a>
        </div>
        <div class="lotus-list">
          ${LOTUS_NAMES.map((n, j) => `<span>${NUMS[j]}　${n}</span>`).join('')}
        </div>` : ''}
        <div class="timer-display" id="timer-${s.id}">00:00</div>
        <div class="timer-hint">計時中鎖屏也不會丟時間</div>
        <div class="timer-btns">
          <button class="btn btn-primary btn-main" onclick="timerToggle('${s.id}')" id="btn-start-${s.id}">▶ 開始計時</button>
          <button class="btn btn-danger" onclick="timerReset('${s.id}')">重置</button>
          <button class="btn btn-success" onclick="markDone('${s.id}')">完成 ✓</button>
        </div>
      </div></div>
    `;
    container.appendChild(el);
  });
}

function renderTimer(id) {
  const el = document.getElementById('timer-' + id);
  const btn = document.getElementById('btn-start-' + id);
  if (!el || !btn) return;
  const sec = elapsedSec(id);
  el.textContent = fmtTime(sec);
  el.classList.toggle('running', !!state.runningSince[id]);
  el.classList.toggle('done-timer', !!state.done[id]);
  btn.textContent = state.runningSince[id] ? '⏸ 暫停'
    : (sec > 0 && !state.done[id] ? '▶ 繼續計時'
    : (state.done[id] ? '▶ 重新練習' : '▶ 開始計時'));
}

function renderHeader(id) {
  const sec = document.getElementById('sec-' + id);
  const status = document.getElementById('status-' + id);
  const num = document.getElementById('num-' + id);
  if (!sec) return;
  const running = !!state.runningSince[id];
  sec.classList.toggle('running', running);
  sec.classList.toggle('done', !!state.done[id]);
  const idx = SECTIONS.findIndex(s => s.id === id);
  if (state.done[id]) {
    num.textContent = '✓';
    status.textContent = '✓ ' + fmtTime(elapsedSec(id));
  } else {
    num.textContent = NUMS[idx];
    status.textContent = elapsedSec(id) > 0 || running ? fmtTime(elapsedSec(id)) : '';
  }
}

function renderAllTimers() {
  SECTIONS.forEach(s => { renderTimer(s.id); renderHeader(s.id); });
}

function toggleSection(id) {
  const sec = document.getElementById('sec-' + id);
  const isOpen = sec.classList.contains('open');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('open'));
  if (!isOpen) sec.classList.add('open');
}

// ── Progress ──────────────────────────────────────────────
function updateProgress() {
  let done = 0;
  SECTIONS.forEach(s => { if (state.done[s.id]) done++; });
  const total = SECTIONS.length;  // 7
  const pct = Math.min(1, done / total);
  // 環形進度：周長 2π×15.5 ≈ 97.4
  document.getElementById('ring-fg').style.strokeDashoffset = 97.4 * (1 - pct);
  document.getElementById('progress-text').textContent = done + '/' + total;
  document.getElementById('ring-wrap').classList.toggle('all-done', done >= total);

  if (done >= total) {
    document.getElementById('completion').classList.add('show');
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
  } else {
    document.getElementById('completion').classList.remove('show');
  }
}

// ── Reset All ─────────────────────────────────────────────
function resetAll() {
  if (!confirm('確定要重置今日所有進度？')) return;
  releaseWake();
  state = { done: {}, secTimers: {}, runningSince: {} };
  saveState();
  location.reload();
}

// ── Init ──────────────────────────────────────────────────
function init() {
  const d = new Date();
  document.getElementById('today-sub').textContent =
    (d.getMonth() + 1) + ' 月 ' + d.getDate() + ' 日　每日修練　持之以恆';

  buildSections();
  renderAllTimers();

  // 上次關閉時若有計時進行中，繼續保持常亮
  if (Object.keys(state.runningSince).length) requestWake();

  // 展開第一個未完成段落
  for (const s of SECTIONS) {
    if (!state.done[s.id]) {
      document.getElementById('sec-' + s.id).classList.add('open');
      break;
    }
  }

  updateProgress();
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
