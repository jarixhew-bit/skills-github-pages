<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>洗髓功法</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0e14;
    --card: #131826;
    --card2: #1a2133;
    --line: #232c42;
    --gold: #d2ab66;
    --gold-soft: #e8d3a4;
    --gold-dim: rgba(210,171,102,0.35);
    --text: #ece4d2;
    --dim: #938b77;
    --green: #5fb586;
    --red: #c96a5e;
    --serif: 'Noto Serif TC', 'Songti TC', 'STSong', 'SimSun', serif;
  }

  html { -webkit-text-size-adjust: 100%; }

  body {
    background:
      radial-gradient(1200px 500px at 50% -10%, #141b2e 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: 'PingFang TC', 'PingFang SC', 'Noto Sans CJK TC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── Header ── */
  header {
    padding: calc(14px + env(safe-area-inset-top)) 20px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(11,14,20,0.85);
    -webkit-backdrop-filter: blur(12px);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-titles { text-align: left; }
  header h1 {
    font-family: var(--serif);
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.35em;
    text-shadow: 0 0 24px var(--gold-dim);
    white-space: nowrap;
  }
  header .sub {
    font-size: 0.72rem;
    color: var(--dim);
    margin-top: 3px;
    letter-spacing: 0.15em;
  }

  /* progress ring */
  .ring-wrap {
    position: relative;
    width: 52px; height: 52px;
    flex-shrink: 0;
  }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--line); stroke-width: 3.5; }
  .ring-fg {
    fill: none;
    stroke: var(--gold);
    stroke-width: 3.5;
    stroke-linecap: round;
    stroke-dasharray: 97.4;
    stroke-dashoffset: 97.4;
    transition: stroke-dashoffset 0.6s ease;
  }
  .ring-wrap.all-done .ring-fg { stroke: var(--green); }
  .ring-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.66rem;
    color: var(--dim);
    letter-spacing: 0;
  }
  .ring-wrap.all-done .ring-text { color: var(--green); }

  /* ── Sections ── */
  main { padding: 14px 14px 0; max-width: 560px; margin: 0 auto; }

  .section {
    margin-bottom: 12px;
    background: linear-gradient(180deg, var(--card2), var(--card));
    border-radius: 18px;
    border: 1px solid var(--line);
    transition: border-color 0.3s, opacity 0.3s;
    overflow: hidden;
  }
  .section.open { border-color: var(--gold-dim); }
  .section.done { border-color: rgba(95,181,134,0.4); opacity: 0.65; }

  .section-header {
    padding: 15px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .section-num {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: rgba(210,171,102,0.08);
    border: 1px solid var(--gold-dim);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--serif);
    font-size: 0.9rem;
    color: var(--gold);
    flex-shrink: 0;
  }
  .section.done .section-num {
    background: var(--green);
    border-color: var(--green);
    color: #0b0e14;
    font-weight: 700;
  }
  .section-title { flex: 1; min-width: 0; }
  .section-title h2 {
    font-family: var(--serif);
    font-size: 1.08rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.12em;
  }
  .section-title span { font-size: 0.72rem; color: var(--dim); letter-spacing: 0.05em; }
  .sec-status {
    font-size: 0.78rem;
    color: var(--dim);
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
  }
  .section.done .sec-status { color: var(--green); }
  .section-chevron {
    color: var(--dim);
    font-size: 1.1rem;
    transition: transform 0.3s;
    flex-shrink: 0;
  }
  .section.open .section-chevron { transform: rotate(90deg); }

  .section-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.35s ease;
  }
  .section.open .section-body { grid-template-rows: 1fr; }
  .section-body > .inner { overflow: hidden; }
  .section.open .section-body > .inner { padding: 0 18px 20px; }

  /* ── Counter ── */
  .counter-wrap { text-align: center; padding: 6px 0 0; }
  .counter-display {
    font-size: 4.6rem;
    font-weight: 200;
    color: var(--gold-soft);
    line-height: 1;
    letter-spacing: -2px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 34px var(--gold-dim);
  }
  .counter-display .counter-total {
    font-size: 1.4rem;
    color: var(--dim);
    font-weight: 300;
    letter-spacing: 0;
  }
  .counter-progress { margin: 14px auto 0; max-width: 280px; }
  .progress-bar {
    background: var(--line);
    border-radius: 10px;
    height: 5px;
    overflow: hidden;
  }
  .progress-fill {
    background: linear-gradient(90deg, var(--gold), var(--gold-soft));
    height: 100%;
    width: 0%;
    transition: width 0.4s ease;
    border-radius: 10px;
  }

  .counter-btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-top: 14px;
  }
  .btn {
    padding: 12px 24px;
    border-radius: 50px;
    border: none;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.93); }
  .btn-secondary {
    background: var(--card2);
    color: var(--text);
    border: 1px solid var(--line);
  }
  .btn-danger {
    background: transparent;
    color: var(--red);
    border: 1px solid rgba(201,106,94,0.5);
    font-size: 0.82rem;
    padding: 9px 18px;
  }
  .btn-success {
    background: var(--green);
    color: #0b0e14;
    font-weight: 700;
  }

  /* big tap button */
  .tap-btn {
    width: 158px; height: 158px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, var(--gold-soft), var(--gold) 65%, #a8823f);
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 18px auto 0;
    box-shadow: 0 6px 34px var(--gold-dim), inset 0 1px 0 rgba(255,255,255,0.35);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .tap-btn:active {
    transform: scale(0.92);
    box-shadow: 0 2px 12px rgba(210,171,102,0.15), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .tap-btn span:first-child { font-size: 2.4rem; }
  .tap-btn span:last-child {
    font-size: 0.72rem;
    color: #33270f;
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: 0.2em;
  }

  /* ── Audio ── */
  .audio-wrap {
    background: rgba(11,14,20,0.5);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 6px;
  }
  .audio-wrap p {
    font-size: 0.78rem;
    color: var(--dim);
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .audio-wrap audio { width: 100%; accent-color: var(--gold); }

  /* ── Lotus video ── */
  .video-wrap {
    background: #000;
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 14px;
    aspect-ratio: 16/9;
    border: 1px solid var(--line);
  }
  .video-wrap iframe { width: 100%; height: 100%; border: 0; display: block; }
  .video-note {
    font-size: 0.7rem;
    color: var(--dim);
    text-align: center;
    margin: -6px 0 12px;
    letter-spacing: 0.05em;
  }

  /* ── Lotus tabs ── */
  .lotus-nav {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 2px 0 10px;
    scrollbar-width: none;
  }
  .lotus-nav::-webkit-scrollbar { display: none; }
  .lotus-tab {
    flex-shrink: 0;
    padding: 7px 14px;
    border-radius: 20px;
    background: rgba(11,14,20,0.5);
    border: 1px solid var(--line);
    color: var(--dim);
    font-size: 0.78rem;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s, color 0.2s;
  }
  .lotus-tab.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #0b0e14;
    font-weight: 700;
  }
  .lotus-tab.done-tab { border-color: rgba(95,181,134,0.5); color: var(--green); }
  .lotus-tab.done-tab.active { background: var(--green); border-color: var(--green); color: #0b0e14; }

  .lotus-slide { display: none; }
  .lotus-slide.active { display: block; }
  .lotus-title {
    text-align: center;
    margin: 10px 0 2px;
    color: var(--gold);
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 600;
    letter-spacing: 0.25em;
  }
  .lotus-btns { display: flex; gap: 10px; margin-top: 12px; }
  .lotus-btns button { flex: 1; }

  /* Timer */
  .timer-display {
    font-size: 3.4rem;
    color: var(--gold-soft);
    text-align: center;
    font-weight: 200;
    letter-spacing: 5px;
    margin: 10px 0 4px;
    font-variant-numeric: tabular-nums;
    text-shadow: 0 0 24px var(--gold-dim);
  }
  .timer-display.running { color: var(--gold); }
  .timer-display.done-timer { color: var(--green); }

  /* ── Completion ── */
  .completion-banner {
    display: none;
    margin: 4px 0 12px;
    background:
      radial-gradient(400px 160px at 50% 0%, rgba(95,181,134,0.18), transparent 70%),
      linear-gradient(180deg, var(--card2), var(--card));
    border: 1px solid rgba(95,181,134,0.45);
    border-radius: 18px;
    padding: 26px 20px;
    text-align: center;
  }
  .completion-banner.show { display: block; animation: rise 0.5s ease; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }
  .completion-banner .icon { font-size: 2.8rem; }
  .completion-banner h2 {
    font-family: var(--serif);
    color: var(--green);
    margin: 12px 0 6px;
    font-size: 1.25rem;
    letter-spacing: 0.3em;
  }
  .completion-banner p { color: var(--dim); font-size: 0.85rem; letter-spacing: 0.15em; }

  .reset-all-wrap { text-align: center; padding: 10px 16px 36px; }
</style>
</head>
<body>

<header>
  <div class="header-titles">
    <h1>洗髓功法</h1>
    <div class="sub" id="today-sub">每日修練　持之以恆</div>
  </div>
  <div class="ring-wrap" id="ring-wrap">
    <svg width="52" height="52" viewBox="0 0 38 38">
      <circle class="ring-bg" cx="19" cy="19" r="15.5"></circle>
      <circle class="ring-fg" id="ring-fg" cx="19" cy="19" r="15.5"></circle>
    </svg>
    <div class="ring-text" id="progress-text">0/7</div>
  </div>
</header>

<main>

<!-- ══════════════════════════════════════
     1. 吐納
════════════════════════════════════════ -->
<div class="section" id="sec-tuna" data-index="0">
  <div class="section-header" onclick="toggleSection('tuna')">
    <div class="section-num" id="num-tuna">一</div>
    <div class="section-title">
      <h2>吐　納</h2>
      <span>調息 160 次</span>
    </div>
    <div class="sec-status" id="status-tuna">0/160</div>
    <div class="section-chevron">›</div>
  </div>
  <div class="section-body" id="body-tuna"><div class="inner">
    <div class="audio-wrap">
      <p>🔊 吐納功法音頻引導</p>
      <audio controls src="../audio/tuna.mp3"></audio>
    </div>

    <div class="counter-wrap">
      <div class="counter-display">
        <span id="tuna-count">0</span><span class="counter-total"> / 160</span>
      </div>
      <div class="counter-progress">
        <div class="progress-bar">
          <div class="progress-fill" id="tuna-bar"></div>
        </div>
      </div>
      <button class="tap-btn" onclick="tap('tuna', 160)">
        <span>🌬️</span>
        <span>點擊計數</span>
      </button>
      <div class="counter-btn-row">
        <button class="btn btn-danger" onclick="resetCounter('tuna', 160)">重置</button>
        <button class="btn btn-success" id="tuna-done-btn" onclick="markDone('tuna')" style="display:none">完成 ✓</button>
      </div>
    </div>
  </div></div>
</div>

<!-- ══════════════════════════════════════
     7. 蓮花生動功
════════════════════════════════════════ -->
<div class="section" id="sec-lotus" data-index="6">
  <div class="section-header" onclick="toggleSection('lotus')">
    <div class="section-num" id="num-lotus">七</div>
    <div class="section-title">
      <h2>蓮花生動功</h2>
      <span>七式</span>
    </div>
    <div class="sec-status" id="status-lotus">0/7</div>
    <div class="section-chevron">›</div>
  </div>
  <div class="section-body" id="body-lotus"><div class="inner">

    <!-- 全套示範影片（B 站，萬行上師蓮花生動功，11:54），七式共用 -->
    <div class="video-wrap">
      <iframe
        src="https://player.bilibili.com/player.html?bvid=BV19J411N7HC&p=1&autoplay=0&danmaku=0&high_quality=1"
        allowfullscreen
        scrolling="no"
        loading="lazy"
        title="蓮花生動功全套示範"></iframe>
    </div>
    <div class="video-note">全套示範影片 · 練到哪一式自行拖動進度</div>

    <!-- Tab nav -->
    <div class="lotus-nav" id="lotus-nav">
      <div class="lotus-tab active" onclick="lotusTab(0)" id="ltab-0">第一式</div>
      <div class="lotus-tab" onclick="lotusTab(1)" id="ltab-1">第二式</div>
      <div class="lotus-tab" onclick="lotusTab(2)" id="ltab-2">第三式</div>
      <div class="lotus-tab" onclick="lotusTab(3)" id="ltab-3">第四式</div>
      <div class="lotus-tab" onclick="lotusTab(4)" id="ltab-4">第五式</div>
      <div class="lotus-tab" onclick="lotusTab(5)" id="ltab-5">第六式</div>
      <div class="lotus-tab" onclick="lotusTab(6)" id="ltab-6">第七式</div>
    </div>

    <!-- Slides -->
    <div id="lotus-slides"></div>

  </div></div>
</div>

<!-- ══════════════════════════════════════
     Completion
════════════════════════════════════════ -->
<div class="completion-banner" id="completion">
  <div class="icon">🏆</div>
  <h2>今日修練完成</h2>
  <p>功德圓滿　明日再練</p>
</div>

<div class="reset-all-wrap">
  <button class="btn btn-danger" onclick="resetAll()">重置全部</button>
</div>

</main>

<script>
// ── Data ──────────────────────────────────────────────────
const LOTUS = [
  { name: '觀音請聖' },
  { name: '仙鶴展翅' },
  { name: '河住江翻' },
  { name: '乾坤旋轉' },
  { name: '犀牛望月' },
  { name: '荷花搖擺' },
  { name: '立地沖天' },
];

const COUNTERS = [
  { id: 'tuna', total: 160 },
  { id: 'shougong', total: 5 },
  { id: 'chuidiao', total: 320 },
  { id: 'shuai', total: 90 },
  { id: 'huiyin', total: 30 },
  { id: 'fugu', total: 30 },
];

const NUMS = ['一','二','三','四','五','六','七'];

// ── State ─────────────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('xisui_state') || '{}');
if (!state.counts) state.counts = {};
if (!state.done) state.done = {};
if (!state.lotusDone) state.lotusDone = {};
if (!state.lotusTimers) state.lotusTimers = {};

let timers = {}; // active interval handles per lotus index

// ── Build Lotus Slides ────────────────────────────────────
function buildLotusSlides() {
  const container = document.getElementById('lotus-slides');
  container.innerHTML = '';
  LOTUS.forEach((item, i) => {
    const slide = document.createElement('div');
    slide.className = 'lotus-slide' + (i === 0 ? ' active' : '');
    slide.id = 'lslide-' + i;

    const isDone = state.lotusDone[i];
    const savedSec = state.lotusTimers[i] || 0;

    slide.innerHTML = `
      <div class="lotus-title">第${NUMS[i]}式　${item.name}</div>

      <div class="timer-display ${isDone ? 'done-timer' : ''}" id="ltimer-${i}">
        ${fmtTime(savedSec)}
      </div>

      <div class="lotus-btns">
        <button class="btn btn-secondary" onclick="lotusTimerToggle(${i})" id="lbtn-start-${i}">
          ${isDone ? '重新練習' : '▶ 開始計時'}
        </button>
        <button class="btn btn-danger" onclick="lotusTimerReset(${i})">重置</button>
        <button class="btn btn-success" onclick="lotusMarkDone(${i})" ${isDone ? '' : 'style="display:none"'} id="lbtn-done-${i}">完成 ✓</button>
      </div>
    `;
    container.appendChild(slide);
  });
}

// ── Toggle Section ────────────────────────────────────────
function toggleSection(id) {
  const sec = document.getElementById('sec-' + id);
  const isOpen = sec.classList.contains('open');
  document.querySelectorAll('.section').forEach(s => s.classList.remove('open'));
  if (!isOpen) sec.classList.add('open');
}

// ── Counter ───────────────────────────────────────────────
function tap(id, total) {
  if (state.done[id]) return;
  let c = (state.counts[id] || 0) + 1;
  if (c > total) c = total;
  state.counts[id] = c;
  saveState();
  updateCounter(id, total);
  if (navigator.vibrate) navigator.vibrate(20);
}

function updateCounter(id, total) {
  const c = state.counts[id] || 0;
  document.getElementById(id + '-count').textContent = c;
  const pct = Math.min(100, c / total * 100);
  document.getElementById(id + '-bar').style.width = pct + '%';
  document.getElementById(id + '-done-btn').style.display = c >= total ? '' : 'none';
  document.getElementById('status-' + id).textContent =
    state.done[id] ? '✓' : c + '/' + total;
}

function resetCounter(id, total) {
  state.counts[id] = 0;
  state.done[id] = false;
  saveState();
  const sec = document.getElementById('sec-' + id);
  sec.classList.remove('done');
  document.getElementById('num-' + id).textContent = NUMS[sec.dataset.index * 1];
  updateCounter(id, total);
  updateProgress();
}

function markDone(id) {
  state.done[id] = true;
  saveState();
  const sec = document.getElementById('sec-' + id);
  sec.classList.add('done');
  sec.classList.remove('open');
  document.getElementById('num-' + id).textContent = '✓';
  document.getElementById('status-' + id).textContent = '✓';
  updateProgress();
}

// ── Lotus Tabs ────────────────────────────────────────────
let currentLotus = 0;

function lotusTab(i) {
  document.getElementById('lslide-' + currentLotus).classList.remove('active');
  document.getElementById('ltab-' + currentLotus).classList.remove('active');
  currentLotus = i;
  document.getElementById('lslide-' + i).classList.add('active');
  document.getElementById('ltab-' + i).classList.add('active');
}

// ── Lotus Timer ───────────────────────────────────────────
function fmtTime(sec) {
  const m = Math.floor(sec / 60).toString().padStart(2, '0');
  const s = (sec % 60).toString().padStart(2, '0');
  return m + ':' + s;
}

function lotusTimerToggle(i) {
  const btn = document.getElementById('lbtn-start-' + i);
  if (timers[i]) {
    clearInterval(timers[i]);
    timers[i] = null;
    btn.textContent = '▶ 繼續計時';
  } else {
    state.lotusDone[i] = false;
    timers[i] = setInterval(() => {
      state.lotusTimers[i] = (state.lotusTimers[i] || 0) + 1;
      saveState();
      const el = document.getElementById('ltimer-' + i);
      if (el) {
        el.textContent = fmtTime(state.lotusTimers[i]);
        el.classList.add('running');
        el.classList.remove('done-timer');
      }
      const doneBtn = document.getElementById('lbtn-done-' + i);
      if (doneBtn) doneBtn.style.display = '';
    }, 1000);
    btn.textContent = '⏸ 暫停';
  }
}

function lotusTimerReset(i) {
  if (timers[i]) { clearInterval(timers[i]); timers[i] = null; }
  state.lotusTimers[i] = 0;
  state.lotusDone[i] = false;
  saveState();
  const el = document.getElementById('ltimer-' + i);
  if (el) { el.textContent = fmtTime(0); el.classList.remove('running', 'done-timer'); }
  const startBtn = document.getElementById('lbtn-start-' + i);
  if (startBtn) startBtn.textContent = '▶ 開始計時';
  const doneBtn = document.getElementById('lbtn-done-' + i);
  if (doneBtn) doneBtn.style.display = 'none';
  document.getElementById('ltab-' + i).classList.remove('done-tab');
  updateLotusStatus();
  updateProgress();
}

function lotusMarkDone(i) {
  if (timers[i]) { clearInterval(timers[i]); timers[i] = null; }
  state.lotusDone[i] = true;
  saveState();
  const el = document.getElementById('ltimer-' + i);
  if (el) { el.classList.remove('running'); el.classList.add('done-timer'); }
  document.getElementById('ltab-' + i).classList.add('done-tab');
  if (navigator.vibrate) navigator.vibrate([50, 30, 50]);

  const allLotus = LOTUS.every((_, idx) => state.lotusDone[idx]);
  if (allLotus) {
    state.done['lotus'] = true;
    saveState();
    const sec = document.getElementById('sec-lotus');
    sec.classList.add('done');
    sec.classList.remove('open');
    document.getElementById('num-lotus').textContent = '✓';
  }
  updateLotusStatus();
  updateProgress();

  // auto advance
  if (i < 6 && !state.lotusDone[i + 1]) {
    setTimeout(() => lotusTab(i + 1), 600);
  }
}

function updateLotusStatus() {
  const n = LOTUS.filter((_, idx) => state.lotusDone[idx]).length;
  document.getElementById('status-lotus').textContent =
    state.done['lotus'] ? '✓' : n + '/7';
}

// ── Progress ──────────────────────────────────────────────
function updateProgress() {
  let done = 0;
  COUNTERS.forEach(c => { if (state.done[c.id]) done++; });
  if (state.done['lotus']) done++;
  const realTotal = 7; // 6 個計數段落 + 蓮花生動功（七式全完成算 1）
  const pct = Math.min(1, done / realTotal);
  // 環形進度：周長 2π×15.5 ≈ 97.4
  document.getElementById('ring-fg').style.strokeDashoffset = 97.4 * (1 - pct);
  document.getElementById('progress-text').textContent = done + '/' + realTotal;
  document.getElementById('ring-wrap').classList.toggle('all-done', done >= realTotal);

  if (done >= realTotal) {
    document.getElementById('completion').classList.add('show');
    if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
  } else {
    document.getElementById('completion').classList.remove('show');
  }
}

// ── Reset All ─────────────────────────────────────────────
function resetAll() {
  if (!confirm('確定要重置今日所有進度？')) return;
  Object.values(timers).forEach(t => t && clearInterval(t));
  timers = {};
  state = { counts: {}, done: {}, lotusDone: {}, lotusTimers: {} };
  saveState();
  location.reload();
}

// ── Save / Load ───────────────────────────────────────────
function saveState() {
  localStorage.setItem('xisui_state', JSON.stringify(state));
}

// ── Init ──────────────────────────────────────────────────
function init() {
  // 頂欄日期
  const d = new Date();
  document.getElementById('today-sub').textContent =
    (d.getMonth() + 1) + ' 月 ' + d.getDate() + ' 日　每日修練　持之以恆';

  buildLotusSlides();

  COUNTERS.forEach(c => {
    updateCounter(c.id, c.total);
    if (state.done[c.id]) {
      const sec = document.getElementById('sec-' + c.id);
      sec.classList.add('done');
      document.getElementById('num-' + c.id).textContent = '✓';
      document.getElementById('status-' + c.id).textContent = '✓';
    }
  });

  LOTUS.forEach((_, i) => {
    if (state.lotusDone[i]) {
      document.getElementById('ltab-' + i).classList.add('done-tab');
    }
  });

  if (state.done['lotus']) {
    const sec = document.getElementById('sec-lotus');
    sec.classList.add('done');
    document.getElementById('num-lotus').textContent = '✓';
  }
  updateLotusStatus();

  // open first incomplete section
  const sections = ['tuna','shougong','chuidiao','shuai','huiyin','fugu','lotus'];
  for (const id of sections) {
    if (!state.done[id]) {
      document.getElementById('sec-' + id).classList.add('open');
      break;
    }
  }

  updateProgress();
}

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
