name: trading-daily
# 股票交易分析器每日数据更新：抓行情 → 算信号 → 提交到 main（GitHub Pages 自动发布）
# 私密区加密需要仓库 Secret: ANALYZER_PW（缺失时只更新公开信号区）

on:
  schedule:
    - cron: '40 21 * * 1-5'   # 美股收盘后（UTC 21:40 ≈ 美东 16:40/17:40）
    - cron: '40 9 * * 2-6'    # 次日早上补漏跑（保险）：GitHub 的定时任务偶尔会被整次跳过；
                              # 昨晚已跑成功时，本次因行情无新数据会跳过提交
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trading-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet cryptography requests
      - name: 抓取行情
        run: python trading/fetch_prices.py
      - name: IBKR Flex 账户同步（持仓/现金/净值，失败不阻断）
        env:
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
        run: python trading/flex_account.py || echo "Flex 同步失败，沿用上次持仓底数"
      - name: 运行分析管线
        env:
          ANALYZER_PW: ${{ secrets.ANALYZER_PW }}
        run: python trading/analyzer.py
      - name: 提交数据
        run: |
          git config user.name "trading-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trading/history trading/data-public.json trading/data-private.enc trading/state.enc
          # 以 history/ 是否有新行情决定提交：data-public.json 含 generated_at 时间戳，
          # 每次运行必有差异，不加此判断补漏跑会在数据未变时产生重复提交
          if git diff --cached --quiet -- trading/history; then
            echo "行情无新数据，跳过提交"
          else
            git commit -m "chore(trading): daily data update $(date -u +%F)"
            # 运行期间 main 可能有新合并（2026-07-12 曾因此推送被拒），rebase 后再推
            git pull --rebase origin main
            git push
          fi
