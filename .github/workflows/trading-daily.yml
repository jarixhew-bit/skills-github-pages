name: trading-daily
# 股票交易分析器数据更新：抓行情 → 算信号 → 提交到 main（GitHub Pages 自动发布）
# 私密区加密需要仓库 Secret: ANALYZER_PW（缺失时只更新公开信号区）

on:
  schedule:
    # 仅美股交易时段内每小时跑一次：UTC 13:00-21:00（≈ 美东 9:00-17:00，覆盖开盘到收盘后缓冲）。
    # 用户 2026-07-18 要求周一至五每小时更新一次（用于 HTML 分析页），非交易时段不跑省 Actions 分钟数。
    # 同一小时内多次运行天然形成冗余，不再需要额外的次日补漏跑。
    - cron: '0 13-21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trading-daily
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet cryptography requests
      - name: 抓取行情
        run: python trading/fetch_prices.py
      - name: IBKR Flex 账户同步（持仓/现金/净值，失败不阻断）
        env:
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
        run: python trading/flex_account.py || echo "Flex 同步失败，沿用上次持仓底数"
      - name: 运行分析管线
        env:
          ANALYZER_PW: ${{ secrets.ANALYZER_PW }}
        run: python trading/analyzer.py
      - name: 提交数据
        run: |
          git config user.name "trading-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trading/history trading/data-public.json trading/data-private.enc trading/state.enc
          # 提交判据：history 或 state.enc 有实质变化就提交。data-public.json/data-private.enc
          # 都含 generated_at 时间戳，每次运行必有差异，不能单独作为判据；但 state.enc
          # 不含时间戳，只要 Flex 刷新了持仓/现金/NAV 就会变——2026-07-14 曾发生 Flex
          # 拉到修正后的持仓但当天行情已抓过、history 无新增，导致修正被判据吞掉不提交
          # 注：state.enc 采用随机 salt/nonce 加密，即使底层数据完全不变，密文也会每次不同，
          # 因此改为每小时运行后，本步骤基本每次都会判定为「有变化」并提交——这是预期行为
          # （用户 2026-07-18 要求的就是 HTML 页面每小时刷新），不是 bug。
          if git diff --cached --quiet -- trading/history trading/state.enc; then
            echo "行情与持仓底数均无变化，跳过提交"
          else
            git commit -m "chore(trading): hourly data update $(date -u +'%F %H:00 UTC')"
            # 运行期间 main 可能有新合并（2026-07-12 曾因此推送被拒），rebase 后再推
            git pull --rebase origin main
            git push
          fi
