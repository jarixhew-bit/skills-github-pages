name: Check image links

on:
  workflow_dispatch:
    inputs:
      file:
        description: "HTML file to check (repo-relative path)"
        required: true
        default: "japan-trip-2026.html"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all image URLs
        run: |
          FILE="${{ github.event.inputs.file }}"
          grep -o 'src="https://[^"]*"' "$FILE" | sed 's/^src="//;s/"$//' | sort -u > urls.txt
          grep -o 'href="https://maps[^"]*"' "$FILE" | sed 's/^href="//;s/"$//' | sed 's/&amp;/\&/g' | sort -u >> urls.txt
          echo "Total unique image URLs: $(wc -l < urls.txt)"
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          REF="https://jarixhew-bit.github.io/"
          BROKEN=0
          while read -r url; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 -L -A "$UA" -e "$REF" "$url" || echo ERR)
            if [ "$code" != "200" ]; then
              BROKEN=$((BROKEN+1))
              echo "BROKEN [$code] $url"
            fi
          done < urls.txt
          echo "Broken count: $BROKEN"
