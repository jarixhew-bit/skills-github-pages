name: fetch-place-photos
on: workflow_dispatch
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract gallery photos
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          curl -sL -A "$UA" "https://www.gankofood.co.jp/shop/detail/ya-nijyoen/gallery" -o gallery.html || true
          python3 - <<'PY'
          import re
          s = open('gallery.html', encoding='utf-8', errors='ignore').read()
          urls = []
          for m in re.findall(r'["\'](/uploads/[A-Za-z0-9_\-/.%]+\.(?:jpg|jpeg|png|webp))["\']', s):
              if m not in urls: urls.append(m)
          open('photo-urls.txt','w').write(f"## gallery size={len(s)}\n" + '\n'.join(urls[:40]))
          print(len(urls))
          PY
          # probe numbered variants of the main image
          for i in 01 02 03 04 05 06 07 08; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -A "$UA" "https://www.gankofood.co.jp/uploads/resized/900x530_ya-nijyoen$i.jpg")
            echo "probe $i: $code" >> photo-urls.txt
          done
          cat photo-urls.txt
      - name: Commit results
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add photo-urls.txt
          git commit -m "CI: place photo URLs v4" || echo "nothing to commit"
          git push
