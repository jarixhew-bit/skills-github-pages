name: fetch-place-photos
on: workflow_dispatch
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch and extract photo URLs
        run: |
          curl -sL -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36" \
            "https://maps.app.goo.gl/1sNSjfdqYinbQkZ18" -o page.html
          echo "size: $(wc -c < page.html)"
          python3 - <<'PY'
          import re
          s = open('page.html', encoding='utf-8', errors='ignore').read()
          s = s.replace('\\u003d','=').replace('\\u0026','&').replace('\\/','/')
          urls = re.findall(r'https://lh\d\.googleusercontent\.com/[A-Za-z0-9_\-=/.&%]+', s)
          seen = []
          for u in urls:
              u = u.rstrip('.')
              if u not in seen and len(u) > 60:
                  seen.append(u)
          open('photo-urls.txt','w').write('\n'.join(seen[:40]))
          print('found', len(seen))
          PY
          head -c 2000 photo-urls.txt
      - name: Commit results
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add photo-urls.txt
          git commit -m "CI: place photo URLs v2" || echo "nothing to commit"
          git push
