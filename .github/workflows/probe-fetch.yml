name: probe-fetch
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Try fetch place photos without API key
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          for CID in 10320232838878048301 5535728105966142773 ; do
            echo "===== cid=$CID ====="
            # 方式1：maps place 页面
            curl -sL -A "$UA" "https://maps.google.com/?cid=$CID" -o page.html
            echo "  page bytes: $(wc -c < page.html)"
            N=$(grep -oE 'https://lh[0-9]\.googleusercontent\.com/[a-zA-Z0-9_/=.-]+' page.html | sort -u | wc -l)
            echo "  lh*.googleusercontent img urls found: $N"
            SAMPLE=$(grep -oE 'https://lh[0-9]\.googleusercontent\.com/[a-zA-Z0-9_/=.-]+' page.html | sort -u | head -1)
            if [ -n "$SAMPLE" ]; then
              echo "  sample: ${SAMPLE:0:80}"
              echo "  sample code: $(curl -s -o /dev/null -w '%{http_code}' -A "$UA" "${SAMPLE}=s800")"
            fi
            # 方式2：place search endpoint (no key) — 看是否可行
            code=$(curl -s -o /dev/null -w '%{http_code}' -A "$UA" "https://www.google.com/maps/place/?q=place_id:")
            echo "  maps search reachable: $code"
          done
