name: Daily Portfolio News Digest

on:
  workflow_dispatch:
  schedule:
    # 目标：柬埔寨（UTC+7）早上 09:00 前后送达 —— 用户 2026-07-17 指定。
    # UTC 00:40 名义触发 + GitHub 常见 1-2 小时排队延迟 ≈ 实际 UTC 1:00-3:00 执行，
    # 即柬埔寨 08:00-10:00、以 09:00 为中心。
    # 教训（2026-07-16/17 连续失败）：trading-daily（21:40 UTC）与本任务共用同一份
    # IBKR Flex 报表，两任务实际执行时间接近时，后到的一方会撞上报表生成冷却期被
    # ErrorCode 1001 持续拒绝。故本任务必须与 trading-daily 的实际执行窗口
    #（约 UTC 22:00-00:30）拉开 ≥2-3 小时，改时间时务必先核对 trading-daily 的 cron。
    # 周二至六 UTC = 美股周一至五收盘后次日；周末无行情不推送（用户 2026-07-13 要求），
    # 且 IBKR 周末维护窗曾致任务失败（2026-07-12）。
    - cron: '40 0 * * 2-6'

jobs:
  news-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install feedparser yfinance requests --quiet

      - name: Run digest
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
        run: python3 .github/scripts/portfolio_news.py
