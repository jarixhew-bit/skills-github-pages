name: Daily Portfolio News Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  news-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Run news digest
        env:
          EMAIL_TO: jarixhew@gmail.com
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          pip install requests feedparser yfinance --quiet
          python3 /dev/stdin <<'PYEOF'
import os, smtplib, feedparser, yfinance as yf
from email.mime.text import MIMEText
from datetime import datetime

HOLDINGS = {
    "IBIT": {"name": "iShares 比特币 ETF", "qty": 357.57, "cost": 39.08},
    "VOO":  {"name": "Vanguard 标普500 ETF", "qty": 114.18, "cost": 550.46},
}

BULLISH = [
    "surge","rally","soar","jump","gain","rise","bull","record high","boost",
    "beat","exceed","strong","growth","upgrade","buy","positive","optimistic",
    "inflow","breakout","upside","recover","approval","approve","adoption",
    "rate cut","fed pivot","soft landing","earnings beat","inflation easing",
]
BEARISH = [
    "drop","fall","crash","slump","decline","bear","loss","risk","warn",
    "miss","weak","downgrade","sell","negative","pessimistic","outflow","fear",
    "breakdown","downside","concern","ban","restrict","lawsuit","fine",
    "rate hike","recession","layoff","earnings miss","default","inflation",
]

def score(text):
    t = text.lower()
    bull = sum(1 for w in BULLISH if w in t)
    bear = sum(1 for w in BEARISH if w in t)
    if bull > bear:   return "🟢 利好", bull, bear
    elif bear > bull: return "🔴 利空", bull, bear
    else:             return "⚪ 中性", bull, bear

def fetch_price_data(ticker):
    tk = yf.Ticker(ticker)
    hist = tk.history(period="1y")
    info = tk.fast_info
    price  = round(info.last_price, 2)
    high52 = round(hist["High"].max(), 2)
    low52  = round(hist["Low"].min(), 2)
    pct_from_low  = round((price - low52)  / (high52 - low52) * 100, 1)
    return price, high52, low52, pct_from_low

def fetch_news(ticker):
    url = f"https://feeds.finance.yahoo.com/rss/2.0/headline?s={ticker}&region=US&lang=en-US"
    feed = feedparser.parse(url)
    items = []
    for e in feed.entries[:8]:
        title   = e.get("title", "")
        link    = e.get("link", "")
        summary = e.get("summary", "")[:200]
        pub     = e.get("published", "")
        s, bull, bear = score(title + " " + summary)
        items.append({"title": title, "link": link, "pub": pub,
                      "sentiment": s, "bull": bull, "bear": bear, "summary": summary})
    return items

def buy_recommendation(ticker, price, cost, pct_from_low, bull_c, bear_c, total):
    pnl_pct   = (price - cost) / cost * 100
    sent_ratio = bull_c / total if total > 0 else 0.5

    # Position in 52-week range score (0=low, 1=high)
    pos = pct_from_low / 100

    lines = []

    # PnL status
    if pnl_pct <= -10:
        lines.append(f"▷ 价格已低于均成本 {abs(pnl_pct):.1f}%，处于浮亏区间")
    elif pnl_pct <= 0:
        lines.append(f"▷ 价格轻微低于均成本 {abs(pnl_pct):.1f}%")
    elif pnl_pct <= 20:
        lines.append(f"▷ 价格高于均成本 {pnl_pct:.1f}%，温和浮盈")
    else:
        lines.append(f"▷ 价格大幅高于均成本 {pnl_pct:.1f}%，浮盈丰厉")

    # 52-week position
    if pos <= 0.2:
        lines.append(f"▷ 处于52周低位区 ({pct_from_low:.0f}%)，属于相对历史低位")
    elif pos <= 0.4:
        lines.append(f"▷ 处于52周偏低区 ({pct_from_low:.0f}%)，有一定安全边际")
    elif pos <= 0.6:
        lines.append(f"▷ 处于52周中间区 ({pct_from_low:.0f}%)，价格居中")
    elif pos <= 0.8:
        lines.append(f"▷ 处于52周偏高区 ({pct_from_low:.0f}%)，谨慎追高")
    else:
        lines.append(f"▷ 处于52周高位区 ({pct_from_low:.0f}%)，追高风险大")

    # Final recommendation
    score_val = 0
    if pnl_pct <= 0:    score_val += 2
    elif pnl_pct <= 20: score_val += 1
    if pos <= 0.3:      score_val += 2
    elif pos <= 0.5:    score_val += 1
    if sent_ratio >= 0.6: score_val += 1
    elif sent_ratio <= 0.3: score_val -= 1

    if score_val >= 4:
        rec = "⭐ 建议分批加仓（价格、位置、情绪均支持）"
    elif score_val >= 2:
        rec = "🟡 可小量定指加仓，投资节奏不必过分强调时机"
    elif score_val >= 0:
        rec = "⏸️ 建议观望，无需操作"
    else:
        rec = "⛔ 建议暂缓，价格偏高且情绪偏空"

    lines.append(f"▷ 今日建议: {rec}")
    lines.append(f"  (长期持有者无需过分优化，小量定期定额即可)")
    return lines

today = datetime.now().strftime("%Y-%m-%d")
bull_total = bear_total = neutral_total = 0
lines = []
lines.append(f"持仓早报 — {today}  每日北京 08:00 自动发送")
lines.append("=" * 54)

for ticker, info in HOLDINGS.items():
    news = fetch_news(ticker)
    price, high52, low52, pct_from_low = fetch_price_data(ticker)
    bull_c = sum(1 for n in news if "利好" in n["sentiment"])
    bear_c = sum(1 for n in news if "利空" in n["sentiment"])
    neut_c = len(news) - bull_c - bear_c
    bull_total += bull_c; bear_total += bear_c; neutral_total += neut_c
    total  = bull_c + bear_c + neut_c
    pnl    = (price - info["cost"]) / info["cost"] * 100
    mv     = round(price * info["qty"], 2)
    pnl_usd = round((price - info["cost"]) * info["qty"], 2)

    if bull_c > bear_c:   overall = "🟢 利好"
    elif bear_c > bull_c: overall = "🔴 利空"
    else:                 overall = "⚪ 中性"

    lines.append("")
    lines.append("─" * 54)
    lines.append(f"▶ {info['name']} ({ticker})")
    lines.append(f"   持仓: {info['qty']} 股 | 均成本: ${info['cost']}")
    lines.append(f"   当前价: ${price}  | 市值: ${mv:,.2f}")
    lines.append(f"   浮盈亏: ${pnl_usd:+,.2f}  ({pnl:+.1f}%)")
    lines.append(f"   52周高: ${high52}  |  52周低: ${low52}")
    lines.append(f"   当前位于52周区间: {pct_from_low:.0f}% 位置")
    lines.append(f"   新闻情绪: {overall}  (利好 {bull_c} | 利空 {bear_c} | 中性 {neut_c})")
    lines.append("")
    lines.append("  《加仓分析》")
    for rec_line in buy_recommendation(ticker, price, info["cost"], pct_from_low, bull_c, bear_c, total):
        lines.append(f"  {rec_line}")
    lines.append("")
    lines.append("  《相关新闻》")
    for i, n in enumerate(news, 1):
        lines.append(f"  {i}. {n['sentiment']}  {n['title']}")
        if n["pub"]:     lines.append(f"     时间: {n['pub']}")
        if n["summary"]: lines.append(f"     摘要: {n['summary']}...")
        lines.append(f"     {n['link']}")
        lines.append("")

lines.append("=" * 54)
if bull_total > bear_total:   mood = "🟢 利好"
elif bear_total > bull_total: mood = "🔴 利空"
else:                          mood = "⚪ 中性"
lines.append(f"组合整体情绪: {mood}")
lines.append(f"新闻汇总: 利好 {bull_total} | 利空 {bear_total} | 中性 {neutral_total}")

body = "\n".join(lines)

gmail_user = os.environ["GMAIL_USER"]
gmail_pw   = os.environ["GMAIL_APP_PASSWORD"]
email_to   = os.environ["EMAIL_TO"]

msg = MIMEText(body, "plain", "utf-8")
msg["Subject"] = f"[持仓早报] {today} {mood} | IBIT & VOO"
msg["From"] = gmail_user
msg["To"]   = email_to

with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
    s.login(gmail_user, gmail_pw)
    s.send_message(msg)
print("Email sent!")
PYEOF
