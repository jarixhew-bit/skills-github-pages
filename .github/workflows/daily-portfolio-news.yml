name: Daily Portfolio News Digest

on:
  workflow_dispatch:
  schedule:
    # UTC 20:40 = Beijing 04:40（GitHub 常有 1-2 小时排队延迟，实际约 06:30-07:30 送达）。
    # 放在 trading-daily（21:40）之前 1 小时：两者共用同一份 IBKR Flex 报表，
    # 排在后面的一方常撞上生成冷却期被 1001 持续拒绝（2026-07-16/17 早报连续失败）。
    # 早报改为先行请求，trading-daily 若被 1001 挡住有次日 09:40 UTC 补跑兜底。
    # 只在交易日收盘后跑（周一至五 UTC)：周末无行情，且 IBKR 周末维护窗曾致任务失败
    #（2026-07-12）。用户 2026-07-13 要求周末不推送。
    - cron: '40 20 * * 1-5'

jobs:
  news-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install feedparser yfinance requests --quiet

      - name: Run digest
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
        run: python3 .github/scripts/portfolio_news.py
