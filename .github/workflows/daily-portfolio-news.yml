name: Daily Portfolio News Digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  news-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch news and send digest
        env:
          EMAIL_TO: jarixhew@gmail.com
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          TODAY=$(date '+%Y-%m-%d')
          TICKERS=("IBIT" "SGOV" "VOO")
          NAMES=("iShares Bitcoin Trust (IBIT)" "iShares 0-3 Month Treasury Bond ETF (SGOV)" "Vanguard S&P 500 ETF (VOO)")

          BODY="Portfolio News Digest - ${TODAY}\n"
          BODY+="================================================\n\n"

          for i in "${!TICKERS[@]}"; do
            T="${TICKERS[$i]}"
            N="${NAMES[$i]}"
            BODY+="## ${N}\n"
            BODY+="https://finance.yahoo.com/quote/${T}/news/\n\n"

            RSS=$(curl -s --max-time 15 "https://feeds.finance.yahoo.com/rss/2.0/headline?s=${T}&region=US&lang=en-US" || true)
            COUNT=0
            while IFS= read -r ITEM; do
              TITLE=$(echo "$ITEM" | grep -oP '(?<=<title>).*?(?=</title>)' | sed 's/<[^>]*>//g' | head -1)
              LINK=$(echo "$ITEM" | grep -oP '(?<=<link>).*?(?=</link>)' | head -1)
              PUB=$(echo "$ITEM" | grep -oP '(?<=<pubDate>).*?(?=</pubDate>)' | head -1)
              if [ -n "$TITLE" ]; then
                COUNT=$((COUNT+1))
                BODY+="  ${COUNT}. ${TITLE}\n"
                [ -n "$PUB" ] && BODY+="     ${PUB}\n"
                [ -n "$LINK" ] && BODY+="     ${LINK}\n"
                BODY+="\n"
              fi
            done < <(echo "$RSS" | grep -oP '(?<=<item>).*?(?=</item>)' | head -5)
            [ $COUNT -eq 0 ] && BODY+="  (No recent news)\n"
            BODY+="\n"
          done

          BODY+="------------------------------------------------\n"
          BODY+="Positions: IBIT x357.57 | SGOV x65.24 | VOO x114.18\n"

          SUBJECT="[每日持仓新闻] ${TODAY} - IBIT / SGOV / VOO"
          printf '%b' "$BODY" > /tmp/body.txt

          {
            printf 'From: Portfolio Bot <%s>\r\n' "$GMAIL_USER"
            printf 'To: %s\r\n' "$EMAIL_TO"
            printf 'Subject: %s\r\n' "$SUBJECT"
            printf 'Content-Type: text/plain; charset=UTF-8\r\n'
            printf '\r\n'
            cat /tmp/body.txt
          } > /tmp/email.txt

          curl --url 'smtps://smtp.gmail.com:465' \
            --ssl-reqd \
            --user "${GMAIL_USER}:${GMAIL_APP_PASSWORD}" \
            --mail-from "${GMAIL_USER}" \
            --mail-rcpt "${EMAIL_TO}" \
            --upload-file /tmp/email.txt

          echo "Done!"
