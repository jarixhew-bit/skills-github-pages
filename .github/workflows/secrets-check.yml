# 密钥扫描：本仓库是公开仓库，任何 push / PR 都跑一次 tools/check-secrets.py，
# 防止误提交 API key、私钥等敏感信息。零 Claude 用量消耗。
name: Secrets Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for hardcoded secrets
        run: python3 tools/check-secrets.py
